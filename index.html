function disposeChunkMeshes(ch){
  for(const item of ch._meshes){
    if(!item || item._pending) continue;
    if(item.geometry) item.geometry.dispose();
    if(item.userData.blinkPhase !== undefined){
      if(item.material) item.material.dispose();
      _antennaLights.delete(item);
    }
    if(item.userData.ownsMaterial){
      if(item.material) item.material.dispose();
    }
    scene.remove(item);
    // Note: shared materials are NOT disposed (antenna lights have their own)
  }
  ch._meshes = [];
}

function recycleChunks(){
  const preset = currentPreset();
  const viewStart = cam.z - 80;
  const viewEnd   = cam.z + WORLD.far * 1.1;

  while(chunks.length && chunks[0].z1 < viewStart){
    const old = chunks.shift();
    disposeChunkMeshes(old);
    chunkPool.push(old);
  }

  while(chunks.length && chunks[chunks.length-1].z1 < viewEnd){
    const ch = chunkPool.pop() || makeChunk();
    const last = chunks[chunks.length-1];
    ch.id  = (last.id + 1)|0;
    ch.z0  = last.z1;
    ch.z1  = ch.z0 + WORLD.chunkLen;
    generateChunk(ch);
    createChunkMeshes(ch);
    chunks.push(ch);
  }
}

function resetWorld(){
  rng = makeRng(SEED);
  cam.x = 0; cam.y = WORLD.baseCamY; cam.z = 0;
  cam.yaw = 0; cam.pitch = -12 * DEG; cam.roll = 0;
  tAccum = 0; camVelZ = 95;

  // Dispose all existing chunk meshes
  for(const ch of chunks) disposeChunkMeshes(ch);
  chunks.length = 0;
  chunkPool.length = 0;

  const preset = currentPreset();
  for(let i=0; i<preset.maxChunks + 2; i++){
    const ch = makeChunk();
    ch.id = i;
    ch.z0 = i * WORLD.chunkLen;
    ch.z1 = ch.z0 + WORLD.chunkLen;
    generateChunk(ch);
    createChunkMeshes(ch);
    chunks.push(ch);
  }

  lastRoadZ = -99999;
  rebuildRoad();

  // Re-init spine cache since SEED may have changed
  _spineCache.clear();

  resetTraffic();
  resetParticles();
}

// Load robot GLBs
const robotLoader = new GLTFLoader();
ROBOT_FILES.forEach(function(fname, idx){
  robotLoader.load('./glbs/robots/' + fname,
    function(gltf){
      const m = gltf.scene;
      const box = new THREE.Box3().setFromObject(m);
      const sz  = new THREE.Vector3(); box.getSize(sz);
      // Normalize to 5 world units max — robots are small figures, not giants
      const sc  = 5.0 / (Math.max(sz.x, sz.y, sz.z) || 1);
      m.scale.setScalar(sc);
      const ct = new THREE.Vector3(); box.getCenter(ct);
      m.position.set(-ct.x * sc, -ct.y * sc, -ct.z * sc);

      // Make red engine/thruster facets full-bright HDR red.
      // Detect by: color.r dominant OR emissive.r dominant (covers both PBR and basic mats).
      // Replace with MeshBasicMaterial(color=hot-red) + high emissiveIntensity to saturate
      // the UnrealBloomPass and make facets appear self-luminous at full brightness.
      m.traverse(child => {
        if(!child.isMesh) return;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        const replaced = mats.map(mat => {
          if(!mat) return mat;
          // Primary detection: name-based — "glow*" materials use a red base-color
          // texture (64×64, ~RGB 252,40,40) as a luminosity flag. Three.js keeps
          // .color white when a baseColorTexture is present, so the color check below
          // would miss them; the name is the reliable signal.
          if(mat.name && mat.name.toLowerCase().includes('glow')){
            const bright = new THREE.MeshStandardMaterial({
              color: new THREE.Color(0, 0, 0),
              emissive: new THREE.Color(1.0, 0.08, 0.02),
              emissiveIntensity: 5.0,
              roughness: 1.0,
              metalness: 0.0,
              side: mat.side !== undefined ? mat.side : THREE.FrontSide,
            });
            mat.dispose();
            return bright;
          }
          // Fallback: explicit red diffuse or emissive color (future models)
          const dc = mat.color;
          const ec = mat.emissive;
          const redByColor    = dc && dc.r > 0.30 && dc.r > dc.g * 2.0 && dc.r > dc.b * 2.0;
          const redByEmissive = ec && ec.r > 0.30 && ec.r > ec.g * 2.0 && ec.r > ec.b * 2.0;
          if(redByColor || redByEmissive){
            // MeshBasicMaterial is unlit — its color is the raw HDR value fed into bloom.
            // We use a very bright red so the UnrealBloomPass adds a wide red halo.
            const bright = new THREE.MeshStandardMaterial({
              color: new THREE.Color(0, 0, 0),
              emissive: new THREE.Color(1.0, 0.04, 0.02),
              emissiveIntensity: 20.0,
              roughness: 1.0,
              metalness: 0.0,
              side: mat.side !== undefined ? mat.side : THREE.FrontSide,
            });
            mat.dispose();
            return bright;
          }
          // Non-glow, non-red material — lower roughness so it catches
          // specular from the neon fill lights without washing out texture.
          if(mat.isMeshStandardMaterial){
            mat.roughness = Math.min(mat.roughness, 0.50);
            mat.metalness = Math.max(mat.metalness, 0.15);
          }
          return mat;
        });
        child.material = Array.isArray(child.material) ? replaced : replaced[0];
      });

      _3models[idx] = m;
      robotModelsLoaded++;
    },
    undefined,
    function(e){ console.warn('Robot GLB fail', idx, fname, e.message || e); }
  );
});

        if(!child.isMesh) return;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        const replaced = mats.map(mat => {
          if(!mat) return mat;
          if(mat.name && mat.name.toLowerCase().includes('glow')){
            const bright = new THREE.MeshStandardMaterial({
              color: new THREE.Color(0, 0, 0),
              emissive: new THREE.Color(1.0, 0.08, 0.02),
              emissiveIntensity: 5.0,
              roughness: 1.0,
              metalness: 0.0,
              side: mat.side !== undefined ? mat.side : THREE.FrontSide,
            });
            mat.dispose();
            return bright;
          }
          // Make all non-glow surfaces self-luminous: emissiveMap mirrors the
          // diffuse texture so colour detail is preserved while shadows are
          // nearly invisible — the emissive term always fires at full texture brightness.
          // emissiveIntensity kept at 0.65 so bright texture pixels (linear ~0.3)
          // output 0.20, safely below the bloom threshold of 0.25.
          if(mat.isMeshStandardMaterial){
            if(mat.map){
              mat.emissive    = new THREE.Color(1, 1, 1);
              mat.emissiveMap = mat.map;
            } else {
              mat.emissive = mat.color.clone();
            }
            mat.emissiveIntensity = 0.40;
            mat.roughness  = Math.min(mat.roughness, 0.55);
            mat.needsUpdate = true;
          }
          return mat;
        });
        child.material = Array.isArray(child.material) ? replaced : replaced[0];
      });

      _3bModels[idx] = m;
      buildingModelsLoaded++;
      // Place any pending buildings that were waiting for this model
      for(let i = _pendingGlbBuildings.length - 1; i >= 0; i--){
        const entry = _pendingGlbBuildings[i];
        if(entry.b.glbIdx === idx && !entry.b._glbMesh){
          placeBuildingGlb(entry.b, entry.ch);
          _pendingGlbBuildings.splice(i, 1);
        }
      }
    },
    undefined,
    function(e){ console.warn('Building GLB fail', fname, e.message || e); }
  );
});

function makeGroundCar(){
  return { active:false, lane:0, laneT:1, laneFrom:0, laneTo:0, z:0, speed:0, len:5, w:2, blink:0, model:0 };
}
function makeFlyingCar(){
  return { active:false, z:0, speed:0, baseAlt:0, off:0, ampX:0, ampY:0, fx:0, fy:0, ph:0, col:neon[0], col2:neon[1], lightMode:0, _prevMode:-1 };
}
function makeRobot(){
  return { active:false, dir:1, z:0, vz:0, off:0, y:0, modelIdx:0, ph:0, bobAmp:0, bobFreq:0, col:neon[0], _mesh:null };
}
function makeParticle(){
  return { active:false, x:0, y:0, z:0, vx:0, vy:0, vz:0, life:0, a:1 };
}

function initGroundCar(c, z){
  c.active = true;
  c.lane = rng.irange(-1, 1);
  c.laneFrom = c.lane; c.laneTo = c.lane; c.laneT = 1;
  c.z = z;
  c.speed = lerp(62, 132, Math.pow(rng.next(), 0.55)) * lerp(0.85, 1.2, config.speed);
  c.len = lerp(4.2, 7.2, rng.next());
  c.w   = lerp(1.7, 2.35, rng.next());
  c.model = rng.irange(0, 3);
  c.blink = rng.range(0, TAU);
}

function initFlyingCar(f, z){
  f.active = true;
  f.z = z;
  f.speed = lerp(95, 175, Math.pow(rng.next(), 0.55)) * lerp(0.9, 1.25, config.speed);
  const layer = rng.irange(0, 3);
  f.baseAlt = lerp(50, 140, layer / 3) + rng.range(-8, 14);
  f.off = rng.range(-WORLD.roadGap*2.2, WORLD.roadGap*2.2);
  f.ampX = rng.range(6, 28);
  f.ampY = rng.range(3, 14);
  // Inner building row spans roughly 35–95u from road spine, max height ~110u.
  // Ensure flying lights clear rooftops when their lateral offset puts them over that band.
  const bldInner = WORLD.roadWidth * 0.5 + WORLD.sidewalk + 8;  // ~25u — start of building zone
  const bldOuter = bldInner + 70;                                // ~95u — outer edge of inner row
  if(Math.abs(f.off) > bldInner && Math.abs(f.off) < bldOuter){
    f.baseAlt = Math.max(f.baseAlt, 120);
    f.ampY    = Math.min(f.ampY, 6);   // also dampen vertical bob so they don't dip back down
  }
  f.fx = rng.range(0.003, 0.010);
  f.fy = rng.range(0.004, 0.013);
  f.ph = rng.range(0, TAU);
  f.col  = neon[rng.irange(0, neon.length-1)];
  f.col2 = neon[rng.irange(0, neon.length-1)];
  const modeRoll = rng.next();
  f.lightMode = modeRoll < 0.33 ? 0 : modeRoll < 0.66 ? 1 : 2; // 0=neon, 1=dual-red, 2=mono-red
  f._prevMode = -1; // force pool material refresh
}

// Robot columns — all within the road air corridor (±35 units from spine).
// Buildings are cleared to ~39 units from the spine, so these stay in open air.
const ROBOT_COLS = [-32, -24, -16, -8, -3, 3, 8, 16, 24, 32];

function initRobot(r){
  r.active   = true;
  r.modelIdx = rng.irange(0, ROBOT_FILES.length - 1);
  r.ph       = rng.range(0, TAU);
  r.bobFreq  = rng.range(0.4, 1.8);
  r.col      = neon[rng.irange(0, neon.length - 1)];

  // ── Altitude zones ──────────────────────────────────────────────────────
  //  Zone 0  lamp-post level (y 10-26)  → oncoming  (36%) — replaces ground cars
  //  Zone 1  camera level    (y 48-78)  → same dir  ( 4%) — sparse
  //  Zone 2  mid-above       (y115-350) → oncoming  (35%)
  //  Zone 3  high-above      (y350-960) → oncoming  (25%)
  const zRoll = rng.next();
  const zone  = zRoll < 0.36 ? 0 : zRoll < 0.40 ? 1 : zRoll < 0.75 ? 2 : 3;
  if(zone === 0)      r.y = rng.range(10, 26);
  else if(zone === 1) r.y = rng.range(48, 78);
  else if(zone === 2) r.y = rng.range(115, 260);
  else                r.y = rng.range(115, 260);  // fusionné — max = buildings × 1.05
  r.bobAmp = r.y < 30 ? rng.range(0.1, 0.8) : rng.range(1.0, 7);

  // ── Direction ────────────────────────────────────────────────────────────
  // Only camera-level (zone 1) travels same direction; everything else oncoming.
  r.dir = (zone === 1) ? 1 : -1;
  const oncoming = (r.dir === -1);

  // ── Column ───────────────────────────────────────────────────────────────
  if(zone === 0){
    // Road level: robots travel on the road between the two rows of lamp posts
    r.off = rng.range(-WORLD.roadWidth * 0.5, WORLD.roadWidth * 0.5);
  } else {
    const colIdx = rng.irange(0, ROBOT_COLS.length - 1);
    r.off = ROBOT_COLS[colIdx] + rng.range(-3, 3);
  }

  const spd = lerp(50, 200, Math.pow(rng.next(), 0.5)) * lerp(0.85, 1.25, config.speed);
  r.vz = oncoming ? -spd : spd;
  r.vx = 0;

  // ── Spawn Z ───────────────────────────────────────────────────────────────
  const visRange = lerp(400, WORLD.far * 0.85, config.fog);
  if(oncoming){
    // 40% spawn close for sense of danger, 60% far for depth
    r.z = rng.next() < 0.40
      ? cam.z + rng.range(12, 55)
      : cam.z + rng.range(55, visRange);
  } else {
    r.z = rng.next() < 0.45
      ? cam.z - rng.range(10, 120)
      : cam.z + rng.range(20, visRange * 0.9);
  }
}

function updateRobots(dt){
  for(let i=0;i<robots.length;i++){
    const r = robots[i];
    if(!r.active) continue;
    const speedMul = lerp(0.80, 1.25, config.speed);
    r.z += r.vz * dt * speedMul;
    if(r.dir === -1){
      if(r.z < cam.z - 60){ initRobot(r); }
    } else {
      if(r.z < cam.z - 250){ initRobot(r); }
      else if(r.z > cam.z + WORLD.far * 1.3){ r.z = cam.z - rng.range(30, 160); }
    }
  }
}

function updateGroundCars(dt){
  for(let i=0;i<groundCars.length;i++){
    const c = groundCars[i];
    if(!c.active) continue;
    c.blink += dt * 2.0;
    // Simple lane change
    if(c.laneT >= 1 && Math.sin(c.blink) > 0.96 && rng.next() < 0.05){
      const dir = rng.next() < 0.5 ? -1 : 1;
      const nl = clamp(c.lane + dir, -1, 1);
      if(nl !== c.lane){ c.laneFrom = c.lane; c.laneTo = nl; c.laneT = 0; }
    }
    if(c.laneT < 1) c.laneT = clamp(c.laneT + dt * 0.55, 0, 1);
    if(c.laneT >= 1) c.lane = c.laneTo;
    c.z += c.speed * dt * lerp(0.78, 1.15, config.speed);
    if(c.z < cam.z - 50){
      initGroundCar(c, cam.z + WORLD.far * rng.range(0.75, 1.08));
    } else if(c.z > cam.z + WORLD.far * 1.15){
      c.z = cam.z + WORLD.near + rng.range(20, WORLD.far * 0.9);
    }
  }
}

function updateFlyingCars(dt){
  for(let i=0;i<flyingCars.length;i++){
    const f = flyingCars[i];
    if(!f.active) continue;
    f.z += f.speed * dt * lerp(0.80, 1.25, config.speed);
    if(f.z < cam.z - 80){
      initFlyingCar(f, cam.z + WORLD.far * rng.range(0.78, 1.12));
    } else if(f.z > cam.z + WORLD.far * 1.25){
      f.z = cam.z + WORLD.near + rng.range(80, WORLD.far);
    }
  }
}

function resetTraffic(){
  const preset = currentPreset();
  const maxG = preset.maxGroundCars;
  const maxF = preset.maxFlyingCars;

  groundCars = new Array(maxG);
  for(let i=0;i<maxG;i++) groundCars[i] = makeGroundCar();
  const maxFCap = Math.min(maxF, _fcMAX); // cap to render pool size
  flyingCars = new Array(maxFCap);
  for(let i=0;i<maxFCap;i++) flyingCars[i] = makeFlyingCar();
  const maxRobots = qualityPresets[QUALITY.HIGH].maxRobots; // always HIGH capacity
  robots = new Array(maxRobots);
  for(let i=0;i<maxRobots;i++) robots[i] = makeRobot();

  spawnTraffic(true);

  // Pre-seed all robots in front of the camera so traffic is visible immediately at load.
  // Override the z that initRobot just assigned — keep everything else (zone, speed, col…).
  const visRange = lerp(400, WORLD.far * 0.85, config.fog);
  for(let i = 0; i < robots.length; i++){
    const r = robots[i];
    if(!r.active) continue;
    // Spread evenly across the forward visible range so all distances are covered
    r.z = cam.z + 10 + (i / Math.max(robots.length - 1, 1)) * (visRange - 10);
  }
}

function spawnTraffic(force){
  const preset = currentPreset();
  const trafficN = 0; // ground cars replaced by lamp-level robots (zone 0)
  const flyingN  = Math.floor(preset.maxFlyingCars * clamp(config.flying, 0, 1));

  let activeG = 0;
  for(let i=0;i<groundCars.length;i++) if(groundCars[i].active) activeG++;
  if(force){ for(let i=0;i<groundCars.length;i++) groundCars[i].active=false; activeG=0; }
  for(let i=0;i<groundCars.length && activeG<trafficN;i++){
    if(!groundCars[i].active){ initGroundCar(groundCars[i], cam.z + WORLD.near + rng.range(20, WORLD.far*0.85)); activeG++; }
  }
  for(let i=0;i<groundCars.length && activeG>trafficN;i++){
    if(groundCars[i].active && groundCars[i].z < cam.z + WORLD.far*0.75){ groundCars[i].active=false; activeG--; }
  }

  let activeF = 0;
  for(let i=0;i<flyingCars.length;i++) if(flyingCars[i].active) activeF++;
  if(force){ for(let i=0;i<flyingCars.length;i++) flyingCars[i].active=false; activeF=0; }
  for(let i=0;i<flyingCars.length && activeF<flyingN;i++){
    if(!flyingCars[i].active){ initFlyingCar(flyingCars[i], cam.z + WORLD.near + rng.range(60, WORLD.far)); activeF++; }
  }
  for(let i=0;i<flyingCars.length && activeF>flyingN;i++){
    if(flyingCars[i].active && flyingCars[i].z < cam.z + WORLD.far*0.7){ flyingCars[i].active=false; activeF--; }
  }

  // Robots: traffic slider is a direct ceiling — user controls this explicitly.
  const robotN = Math.floor(qualityPresets[QUALITY.HIGH].maxRobots * clamp(config.traffic, 0, 1));
  let activeR = 0;
  for(let i=0;i<robots.length;i++) if(robots[i].active) activeR++;
  if(force){ for(let i=0;i<robots.length;i++) robots[i].active=false; activeR=0; }
  for(let i=0;i<robots.length && activeR<robotN;i++){
    if(!robots[i].active){ initRobot(robots[i]); activeR++; }
  }
  // Shed robots in two passes: behind camera first, beyond fog second.
  // Never deactivate robots approaching from in front — that causes visible pop-out.
  for(let i=0;i<robots.length && activeR>robotN;i++){
    const r=robots[i];
    if(r.active && r.z < cam.z - 20){ r.active=false; activeR--; }
  }
  for(let i=0;i<robots.length && activeR>robotN;i++){
    const r=robots[i];
    if(r.active && r.z > cam.z + WORLD.far){ r.active=false; activeR--; }
  }
}

let particleGeo = null;
let particleMesh = null;
const _partPos = new Float32Array(980 * 3); // max particles

function resetParticles(){
  const preset = currentPreset();
  const maxP = preset.maxParticles;
  particles = new Array(maxP);
  for(let i=0;i<maxP;i++) particles[i] = makeParticle();
  if(particleMesh){ scene.remove(particleMesh); particleMesh.geometry.dispose(); }
  particleGeo = new THREE.BufferGeometry();
  particleGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(maxP * 3), 3));
  const partMat = new THREE.PointsMaterial({ size: 1.2, color: 0xaaddff, transparent: true, opacity: 0.35, sizeAttenuation: true, depthWrite: false });
  particleMesh = new THREE.Points(particleGeo, partMat);
  particleMesh.frustumCulled = false;
  scene.add(particleMesh);
  spawnParticles(true);
}

function initParticle(p, z){
  p.active = true;
  const spread = lerp(0.75, 1.05, rng.next());
  const cityW = WORLD.cityHalfW * spread;
  p.z = z;
  p.x = cam.x + rng.range(-cityW, cityW);
  p.y = cam.y + rng.range(10, 120);
  const wind = fbm1D((cam.z + z) * 0.0009, SEED ^ 0x0F0F0F0F) * 12;
  p.vx = wind * 0.18 + rng.range(-1.0, 1.0);
  p.vy = -rng.range(90, 190);
  p.vz = rng.range(0, 20);
  p.life = rng.range(0.6, 1.6);
  p.a = rng.range(0.12, 0.28);
}

function spawnParticles(force){
  const preset = currentPreset();
  const target = Math.floor(preset.maxParticles * clamp(config.particles, 0, 1));
  if(force){ for(let i=0;i<particles.length;i++) particles[i].active=false; }
  let active = 0;
  for(let i=0;i<particles.length;i++) if(particles[i].active) active++;
  for(let i=0;i<particles.length && active<target;i++){
    if(!particles[i].active){ initParticle(particles[i], cam.z + rng.range(20, WORLD.far)); active++; }
  }
  for(let i=0;i<particles.length && active>target;i++){
    if(particles[i].active && particles[i].z < cam.z + WORLD.far*0.7){ particles[i].active=false; active--; }
  }
}

function updateParticles(dt){
  if(!particleGeo) return;
  const posAttr = particleGeo.attributes.position;
  let vi = 0;
  for(let i=0;i<particles.length;i++){
    const p = particles[i];
    if(!p.active){ continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.z += p.vz * dt;
    p.life -= dt;
    if(p.life <= 0 || p.y < -5){
      p.active = false;
      spawnParticles(false);
      continue;
    }
    posAttr.array[vi*3]   = p.x;
    posAttr.array[vi*3+1] = p.y;
    posAttr.array[vi*3+2] = p.z;
    vi++;
  }
  // Zero out remaining slots
  for(let j=vi; j<particles.length; j++){
    posAttr.array[j*3] = 0; posAttr.array[j*3+1] = -9999; posAttr.array[j*3+2] = 0;
  }
  if(vi > 0) posAttr.needsUpdate = true;
  particleMesh.visible = vi > 0 && config.particles > 0.001;
}

/* =========================
   FPS + Auto Quality
========================= */
let fps = 60, fpsAvg = 60, fpsAcc = 0, fpsFrames = 0, fpsTimer = 0;
let _realLast = 0; // wall-clock timestamp for true FPS — NOT clamped like dt
let _hudCountR = 0, _hudCountP = 0;
// Continuous traffic budget: 0 (starved) → 1 (full).
// Rises slowly when FPS is good, falls quickly when FPS drops.
let trafficBudget = 0.8;

function updateFps(dt){
  const realNow = now();
  const realDt  = _realLast > 0 ? (realNow - _realLast) / 1000 : dt;
  _realLast = realNow;
  fpsTimer += realDt;
  fpsAcc += 1 / Math.max(0.001, realDt); // unclamped — shows true frame time
  fpsFrames++;
  if(fpsTimer >= 0.25){
    fps    = fpsAcc / fpsFrames;
    fpsAvg = lerp(fpsAvg, fps, 0.25);  // faster reaction than before
    fpsAcc = 0; fpsFrames = 0; fpsTimer = 0;
    const msPerFrame = fpsAvg > 0 ? (1000 / fpsAvg).toFixed(1) : '--';
    fpsCorner.textContent = fpsAvg.toFixed(0) + ' fps  ' + msPerFrame + 'ms';
    _hudCountR = robots.reduce((n,r)=>n+(r.active?1:0),0);
    _hudCountP = particles.reduce((n,p)=>n+(p.active?1:0),0);

    if(config.qualityMode === QUALITY.AUTO){
      // Map fpsAvg to a 0-1 score: 0 at ≤20fps, 1 at ≥60fps
      const fpsScore = clamp((fpsAvg - 20) / (60 - 20), 0, 1);
      const target   = Math.pow(fpsScore, 1.4); // slightly convex curve
      // Asymmetric lerp: shed budget fast, restore slowly
      const rate = target < trafficBudget ? 0.30 : 0.06;
      trafficBudget = lerp(trafficBudget, target, rate);

      // Keep qualityStep in sync for HUD label + building chunk counts
      if     (trafficBudget > 0.70) config.qualityStep = QUALITY.HIGH;
      else if(trafficBudget > 0.35) config.qualityStep = QUALITY.MED;
      else                          config.qualityStep = QUALITY.LOW;
      qLabel.textContent = "Quality: AUTO (" + (fpsAvg).toFixed(0) + " fps / budget " + (trafficBudget*100).toFixed(0) + "%)";
    } else {
      // Manual mode — budget always full so preset caps apply directly
      trafficBudget = 1.0;
    }
  }
}

/* =========================
   Camera update
========================= */
function update(dt){
  tAccum += dt;

  updateParking(dt);

  if(!combatMode && parkState.phase === 'idle'){
    const speedCtl = lerp(0.55, 1.45, clamp(config.speed,0,1));
    camVelZ = lerp(82, 140, speedCtl);
    cam.z += camVelZ * dt;

    const ahead = 30;
    const x0 = spineX(cam.z);
    const x1 = spineX(cam.z + ahead);
    const targetYaw = Math.atan2((x1 - x0), ahead);

    cam.yaw = lerp(cam.yaw, targetYaw, 0.06);
    const sway = Math.sin(tAccum*0.55) * 6 + Math.sin(tAccum*0.17) * 10;
    cam.x = x0 + spineSway(cam.z) * 0.9 + sway;

    const altNoise = fbm1D(cam.z * 0.0009 + 10.0, SEED ^ 0xC0FFEE11);
    const targetY = WORLD.baseCamY + altNoise*10 + 10*Math.sin(tAccum*0.22);
    cam.y = lerp(cam.y, targetY, 0.03);

    cam.roll = lerp(cam.roll, (-targetYaw) * 0.15 + Math.sin(tAccum*0.9)*0.01, 0.05);

    const targetPitch = (-11.5 * DEG) + Math.sin(tAccum*0.33)*0.015 - (camVelZ - 95) * 0.0006;
    cam.pitch = lerp(cam.pitch, targetPitch, 0.05);
  }

  if(combatMode){
    updateManualControl(dt);
    updateProjectiles(dt);
  }
  updateExplosions(dt);
  updateFragments(dt);

  recycleChunks();
  spawnTraffic(false);
  updateGroundCars(dt);
  updateFlyingCars(dt);
  updateRobots(dt);
  updateParticles(dt);
}

/* =========================
   Per-frame rendering updates
========================= */
function updateRobotPool(){
  for(let i = 0; i < robots.length && i < _3MAX; i++){
    const r  = robots[i];
    const mg = _3pool[i];
    if(!r || !mg){ if(mg) mg.visible=false; continue; }
    if(!r.active){ mg.visible=false; continue; }
    const mdl = _3models[r.modelIdx];
    if(!mdl){ mg.visible=false; continue; }
    if(mg.userData.modelIdx !== r.modelIdx){
      // Swap model — clear all previous children unconditionally
      for(let c = mg.children.length - 1; c >= 0; c--) mg.remove(mg.children[c]);
      mg.add(mdl.clone());
      mg.userData.modelIdx = r.modelIdx;
    }
    const bobY = r.bobAmp * Math.sin(tAccum * r.bobFreq + r.ph);
    mg.position.set(spineXC(r.z) + r.off, r.y + bobY, r.z);
    mg.rotation.y = r.vz > 0 ? 0 : Math.PI;
    mg.rotation.z = Math.sign(r.vz) * -0.15;
    mg.rotation.x = 0;
    r._mesh = mg;   // O(1) collision reference

    mg.visible = true;
  }
}

function updateGroundCarPool(){
  const laneW = WORLD.roadWidth / WORLD.lanes;
  for(let i = 0; i < groundCars.length && i < _gcMAX; i++){
    const c = groundCars[i];
    const g = _gcPool[i];
    if(!c || !g) continue;
    if(!c.active){ g.visible=false; continue; }
    const t = c.laneT;
    const lane = (t >= 1) ? c.lane : lerp(c.laneFrom, c.laneTo, smoothstep(0,1,t));
    const lx = spineXC(c.z) + lane * laneW;
    g.position.set(lx, 0.5, c.z);
    g.rotation.y = 0;
    g.scale.set(c.w, 1, c.len / 4.5);
    g.visible = true;
  }
  // Hide slots beyond active count
  for(let i = groundCars.length; i < _gcMAX; i++){
    if(_gcPool[i]) _gcPool[i].visible = false;
  }
}

function updateFlyingCarPool(){
  for(let i = 0; i < flyingCars.length && i < _fcMAX; i++){
    const f = flyingCars[i];
    const g = _fcPool[i];
    if(!f || !g) continue;
    if(!f.active){ g.visible=false; continue; }
    const fx = spineXC(f.z) + f.off + Math.sin(tAccum*f.fx + f.ph) * f.ampX;
    const fy = f.baseAlt + Math.sin(tAccum*f.fy + f.ph*1.3) * f.ampY;
    g.position.set(fx, fy, f.z);
    // Apply light mode only when it changed (e.g. after initFlyingCar)
    if(f._prevMode !== f.lightMode){
      f._prevMode = f.lightMode;
      const body = g.children[0];
      const eL   = g.children[1];
      const eR   = g.children[2];
      const mono = g.children[3];
      if(f.lightMode === 0){
        // Neon dual lights
        body.visible = true; eL.visible = true; eR.visible = true; mono.visible = false;
        eL.material.emissive.copy(neonColor(f.col));
        eR.material.emissive.copy(neonColor(f.col2));
        eL.material.emissiveIntensity = 2.2;
        eR.material.emissiveIntensity = 2.2;
      } else if(f.lightMode === 1){
        // Dual red lights
        body.visible = true; eL.visible = true; eR.visible = true; mono.visible = false;
        eL.material.emissive.setRGB(1, 0.02, 0.02);
        eR.material.emissive.setRGB(1, 0.02, 0.02);
        eL.material.emissiveIntensity = 2.5;
        eR.material.emissiveIntensity = 2.5;
      } else {
        // Single mono red orb — body and dual engines hidden
        body.visible = false; eL.visible = false; eR.visible = false; mono.visible = true;
      }
    }
    g.visible = true;
  }
  for(let i = flyingCars.length; i < _fcMAX; i++){
    if(_fcPool[i]) _fcPool[i].visible = false;
  }
}

function updateDrones(){
  for(const ch of chunks){
    for(const dr of ch.drones){
      if(!dr._mesh) continue;
      dr._mesh.position.y = dr.y + Math.sin(tAccum * dr.wob + dr.ph) * 2.5;
      dr._mesh.rotation.y = tAccum * 0.4 + dr.ph;
    }
  }
}

/* =========================
   Main frame loop
========================= */
let last = now();

let _frameCount = 0;
function frame(){
  const t = now();
  let dt = clamp((t - last) / 1000, 0.001, 0.045);
  last = t;
  _frameCount++;

  if(!config.paused){
    _spineCache.clear();
    update(dt);
  } else {
    tAccum += dt * 0.25;
  }

  // Sync Three.js camera
  camera.position.set(cam.x, cam.y, cam.z);
  camera.rotation.y = (combatMode && rearView) ? -cam.yaw : Math.PI - cam.yaw;
  camera.rotation.x = (combatMode && rearView) ? -cam.pitch : cam.pitch;
  camera.rotation.z = cam.roll;

  // Update bloom + fog (max strength 0.85 — neon glow without whiteout)
  bloomPass.enabled  = config.bloom > 0.005;
  bloomPass.strength = config.bloom * 0.85;
  const fogFar = lerp(400, WORLD.far * 0.9, config.fog);
  scene.fog.far = fogFar;

  // Rebuild road if camera has moved far enough
  if(Math.abs(cam.z - lastRoadZ) > 120){
    rebuildRoad();
    lastRoadZ = cam.z;
  }

  // Move ground plane under camera
  ground.position.x = cam.x;
  ground.position.z = cam.z;

  // Move stars with camera (so they're always around us)
  _starsMesh.position.set(cam.x, 0, cam.z);

  // Neon fill lights orbit camera to simulate environmental neon bounce
  neonFillA.position.set(cam.x - 18, cam.y + 8, cam.z + 10);
  neonFillB.position.set(cam.x + 18, cam.y + 5, cam.z + 10);

  // Rim DirectionalLight colour cycles — no position update needed (direction is fixed)
  {
    // Two overlapping sine waves at inharmonic frequencies → irregular colour rhythm
    const t1 = tAccum * 0.38;
    const t2 = tAccum * 0.61;
    const idx1 = Math.floor(t1) % RIM_COLS.length;
    const idx2 = Math.floor(t2) % RIM_COLS.length;
    const frac1 = t1 - Math.floor(t1);
    const frac2 = t2 - Math.floor(t2);
    const c1 = RIM_COLS[idx1], c2 = RIM_COLS[(idx1+1) % RIM_COLS.length];
    const c3 = RIM_COLS[idx2], c4 = RIM_COLS[(idx2+1) % RIM_COLS.length];
    const r = lerp(lerp(c1[0],c2[0],frac1), lerp(c3[0],c4[0],frac2), 0.5);
    const g = lerp(lerp(c1[1],c2[1],frac1), lerp(c3[1],c4[1],frac2), 0.5);
    const b = lerp(lerp(c1[2],c2[2],frac1), lerp(c3[2],c4[2],frac2), 0.5);
    neonRim.color.setRGB(r, g, b);
  }

  // Sky dome follows camera exactly
  skyDome.position.set(cam.x, cam.y, cam.z);

  // Background city silhouette ring follows camera XZ
  bgCity.front.position.set(cam.x, 0, cam.z);
  bgCity.side.position.set(cam.x, 0, cam.z);
  bgFwd.front.position.set(cam.x, 0, cam.z);
  bgFwd.side.position.set(cam.x, 0, cam.z);


  updateRobotPool();
  updateFlyingCarPool();
  updateDrones();

  // Antenna blink lights — throttled to every 3rd frame (imperceptible at 60fps, ~2s blink period)
  if((_frameCount % 3) === 0){
    for(const light of _antennaLights){
      const t = (tAccum * 0.5 + light.userData.blinkPhase) % 1.0;
      light.material.emissiveIntensity = t < 0.055 ? 9.0 : 0.0;
    }
  }

  updateFps(dt);

  if(config.showHud){
    const modeLabel = (config.qualityMode === QUALITY.AUTO)
      ? ("AUTO/" + (config.qualityStep===QUALITY.HIGH?"HIGH":config.qualityStep===QUALITY.MED?"MED":"LOW"))
      : (config.qualityMode===QUALITY.HIGH?"HIGH":config.qualityMode===QUALITY.MED?"MED":"LOW");
    const countR = _hudCountR;
    const countP = _hudCountP;
    hud.innerHTML =
      `<div>FPS: <b>${fpsAvg.toFixed(1)}</b> <span class="small">(inst ${fps.toFixed(1)})</span></div>` +
      `<div>Quality: <b>${modeLabel}</b></div>` +
      `<div>Robots: <b>${countR}</b> <span class="small">(${robotModelsLoaded}/${ROBOT_FILES.length})</span></div>` +
      `<div>Bldg GLB: <b>${buildingModelsLoaded}/${BUILDING_FILES.length}</b></div>` +
      `<div>Particles: <b>${countP}</b> | Bloom: <b>${config.bloom.toFixed(2)}</b></div>`;
  }

  composer.render();
  requestAnimationFrame(frame);
}

window.addEventListener("keydown", (e) => {
  if(e.repeat) return;
  // Ctrl+Alt+Z — toggle combat mode
  if(e.ctrlKey && e.altKey && e.key.toLowerCase() === 'z'){
    e.preventDefault();
    if(!combatMode && parkState.phase === 'idle'){
      const side = cam.x < spineXC(cam.z) ? 1 : -1;
      parkState.targetX = spineXC(cam.z) + side * (WORLD.roadWidth * 0.5 + 35);
      parkState.phase = 'parking';
      parkState.timer = 0;
      document.getElementById('park-msg').textContent = '[ AUTOMATIC PARKING IN PROCESS ]';
      document.getElementById('combat-hud').classList.add('on');
      document.querySelector('.reticle').style.display = 'none';
      renderer.domElement.requestPointerLock();  // keydown is a valid user gesture
    } else if(combatMode || parkState.phase !== 'idle'){
      exitCombatMode();
    }
    return;
  }
  const k = (e.key || "").toLowerCase();
  if(k === 'escape' && (combatMode || parkState.phase !== 'idle')){ exitCombatMode(); return; }
  if(k === "h"){ toggleUI(); }
  else if(k === " "){ e.preventDefault(); togglePause(); }
  else if(k === "f"){ requestFS(); }
  else if(k === "r" && !combatMode){ resetSeed(); }
  else if(k === "1"){ setQualityMode(QUALITY.HIGH); }
  else if(k === "2"){ setQualityMode(QUALITY.MED); }
  else if(k === "3"){ setQualityMode(QUALITY.LOW); }
  else if(k === "4"){ setQualityMode(QUALITY.AUTO); }
  else if(k === "t"){ config.showHud = !config.showHud; hud.classList.toggle("on", !!config.showHud); }
}, { passive: false });

});

/* =========================
   Combat Mode
========================= */

function updateParking(dt){
  if(parkState.phase === 'idle' || parkState.phase === 'done') return;
  if(parkState.phase === 'parking'){
    cam.x     = lerp(cam.x,     parkState.targetX, 0.04);
    camVelZ   = lerp(camVelZ,   0,                 0.06);
    cam.yaw   = lerp(cam.yaw,   0,   0.05);
    cam.pitch = lerp(cam.pitch, 0,   0.05);
    cam.roll  = lerp(cam.roll,  0,   0.05);
    if(Math.abs(cam.x - parkState.targetX) < 1.5 && camVelZ < 2){
      camVelZ = 0;
      parkState.phase = 'msg1';
      parkState.timer = 0;
      document.getElementById('park-msg').textContent = '[ AUTOMATIC PARKING COMPLETED ]';
    }
  } else if(parkState.phase === 'msg1'){
    parkState.timer += dt;
    if(parkState.timer > 1.8){
      parkState.phase = 'msg2';
      parkState.timer = 0;
      document.getElementById('park-msg').textContent = '[ MANUAL CONTROL ENGAGED ]';
    }
  } else if(parkState.phase === 'msg2'){
    parkState.timer += dt;
    if(parkState.timer > 1.5){
      parkState.phase = 'done';
      document.querySelector('.reticle').style.display = '';
      combatMode = true;
      mouseYaw   = cam.yaw;
      mousePitch = cam.pitch;
      // Pointer lock must be requested from a user gesture (click), not here
      document.getElementById('park-msg').textContent = '';
    }
  }
}

function updateManualControl(dt){
  cam.yaw   = mouseYaw;
  cam.pitch = mousePitch;
  const cy = Math.cos(cam.yaw), sy = Math.sin(cam.yaw);
  const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
  // Forward = direction camera faces (derived from camera.rotation.y = PI - yaw, rotation.x = pitch)
  const fx = -sy*cp, fy = sp, fz = cy*cp;
  // Right = camera's +X in world space
  const rx = -cy, rz = -sy;
  const spd = 55;
  if(combatKeys['KeyW']){ cam.x += fx*spd*dt; cam.y += fy*spd*dt; cam.z += fz*spd*dt; }
  if(combatKeys['KeyS']){ cam.x -= fx*spd*dt; cam.y -= fy*spd*dt; cam.z -= fz*spd*dt; }
  if(combatKeys['KeyD']){ cam.x += rx*spd*dt; cam.z += rz*spd*dt; }
  if(combatKeys['KeyA']){ cam.x -= rx*spd*dt; cam.z -= rz*spd*dt; }
  if(combatKeys['KeyQ'])  cam.roll = lerp(cam.roll,  0.35, 0.12);
  if(combatKeys['KeyE'])  cam.roll = lerp(cam.roll, -0.35, 0.12);
  if(!combatKeys['KeyQ'] && !combatKeys['KeyE']) cam.roll = lerp(cam.roll, 0, 0.10);
}

function fireLaser(){
  const cy = Math.cos(cam.yaw), sy = Math.sin(cam.yaw);
  const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
  const fx = -sy*cp, fy = sp, fz = cy*cp;
  const rx = -cy, rz = -sy;
  const spd = 480;
  [[-1.8, -1.2], [1.8, -1.2]].forEach(([ox, oy]) => {
    const geo = new THREE.BoxGeometry(0.15, 0.15, 5.0);
    const mat = new THREE.MeshBasicMaterial({ color:0xff4400, blending:THREE.AdditiveBlending, transparent:true, opacity:0.9 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(cam.x + rx*ox, cam.y + oy, cam.z + rz*ox);
    mesh.rotation.order = 'YXZ';
    mesh.rotation.y = Math.PI - cam.yaw;
    mesh.rotation.x = cam.pitch;
    scene.add(mesh);
    projectiles.push({ mesh, vx:fx*spd, vy:fy*spd, vz:fz*spd, life:1.8 });
  });
}

function fireMissile(){
  const side = missileAlt === 0 ? -2.5 : 2.5;
  missileAlt ^= 1;
  const cy = Math.cos(cam.yaw), sy = Math.sin(cam.yaw);
  const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
  const fx = -sy*cp, fy = sp, fz = cy*cp;
  const rx = -cy, rz = -sy;
  const spd = 320;
  const geo = new THREE.BoxGeometry(0.5, 0.5, 3.5);
  const mat = new THREE.MeshBasicMaterial({ color:0xff8800, blending:THREE.AdditiveBlending, transparent:true, opacity:0.95 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(cam.x + rx*side, cam.y + 1.5, cam.z + rz*side);
  mesh.rotation.order = 'YXZ';
  mesh.rotation.y = Math.PI - cam.yaw;
  mesh.rotation.x = cam.pitch;
  scene.add(mesh);
  projectiles.push({ mesh, vx:fx*spd, vy:fy*spd, vz:fz*spd, life:2.2 });
}

function updateProjectiles(dt){
  for(let i = projectiles.length - 1; i >= 0; i--){
    const p = projectiles[i];
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    p.life -= dt;
    let hit = false;
    for(let ri = 0; ri < robots.length; ri++){
      const r = robots[ri];
      if(!r.active || !r._mesh) continue;
      const dx = p.mesh.position.x - r._mesh.position.x;
      const dy = p.mesh.position.y - r._mesh.position.y;
      const dz = p.mesh.position.z - r._mesh.position.z;
      if(dx*dx + dy*dy + dz*dz < 36){ hit = true; explodeRobot(r, r._mesh); break; }
    }
    if(p.life <= 0 || hit){
      scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose();
      projectiles.splice(i, 1);
    }
  }
}

function spawnExplosion(pos){
  const layers = [
    { r1:14, dur:0.55, col:0xffffff },
    { r1:10, dur:0.80, col:0xff8800 },
    { r1: 8, dur:1.10, col:0xff2200 },
  ];
  const exp = { meshes:[], timer:0 };
  layers.forEach(l => {
    const geo = new THREE.SphereGeometry(1, 8, 6);
    const mat = new THREE.MeshBasicMaterial({ color:l.col, blending:THREE.AdditiveBlending, transparent:true, opacity:0.8, depthWrite:false });
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(pos);
    scene.add(m);
    exp.meshes.push({ mesh:m, r1:l.r1, dur:l.dur });
  });
  explosions.push(exp);
}

function updateExplosions(dt){
  for(let i = explosions.length - 1; i >= 0; i--){
    const e = explosions[i];
    e.timer += dt;
    let allDone = true;
    e.meshes.forEach(l => {
      const t = Math.min(e.timer / l.dur, 1);
      l.mesh.scale.setScalar(lerp(0.2, l.r1, t));
      l.mesh.material.opacity = (1 - t) * 0.8;
      if(t < 1) allDone = false;
    });
    if(allDone){
      e.meshes.forEach(l => { scene.remove(l.mesh); l.mesh.geometry.dispose(); l.mesh.material.dispose(); });
      explosions.splice(i, 1);
    }
  }
}

function explodeRobot(r, robotGroup){
  r.active = false;
  robotGroup.visible = false;
  const pos = robotGroup.position.clone();
  const crash = Math.random() < 0.60;
  if(!crash) spawnExplosion(pos);

  // Shared flag — only one explosion fires per crash robot
  const crashRef = { done: false };
  // Timer: explosion fires after this delay (seconds), regardless of y position
  const crashDelay = 1.1 + Math.random() * 0.6;

  const MAX_TRIS = 28;
  let triCount = 0;
  robotGroup.traverse(child => {
    if(triCount >= MAX_TRIS || !child.isMesh) return;
    const geo = child.geometry;
    const posAttr = geo.attributes.position;
    const idx = geo.index;
    child.updateWorldMatrix(true, false);
    const wm = child.matrixWorld;
    const faceCount = idx ? idx.count / 3 : posAttr.count / 3;
    const step = Math.max(1, Math.ceil(faceCount / (MAX_TRIS - triCount)));
    for(let f = 0; f < faceCount && triCount < MAX_TRIS; f += step){
      const fa = idx ? idx.getX(f*3)   : f*3;
      const fb = idx ? idx.getX(f*3+1) : f*3+1;
      const fc = idx ? idx.getX(f*3+2) : f*3+2;
      const verts = new Float32Array(9);
      [fa, fb, fc].forEach((vi, ii) => {
        const v = new THREE.Vector3(posAttr.getX(vi), posAttr.getY(vi), posAttr.getZ(vi)).applyMatrix4(wm);
        verts[ii*3] = v.x; verts[ii*3+1] = v.y; verts[ii*3+2] = v.z;
      });
      const tGeo = new THREE.BufferGeometry();
      tGeo.setAttribute('position', new THREE.BufferAttribute(verts.slice(), 3));
      tGeo.computeVertexNormals();
      const srcMat = child.material;
      const col = (srcMat && srcMat.color) ? srcMat.color : new THREE.Color(0x888888);
      const tMat = new THREE.MeshStandardMaterial({ color:col, emissive:new THREE.Color(0.4,0.2,0), side:THREE.DoubleSide, transparent:true, opacity:1 });
      const tm = new THREE.Mesh(tGeo, tMat);
      tm.position.copy(pos);
      scene.add(tm);

      let vx, vy, vz, ay, maxLife;
      if(crash){
        // Strong horizontal tumble — pieces skid/roll along the ground
        const angle = Math.random() * Math.PI * 2;
        const hspd  = 8 + Math.random() * 14;
        vx = Math.cos(angle) * hspd;
        vz = Math.sin(angle) * hspd;
        vy = 4 + Math.random() * 6;    // toss upward first so there's visible airtime
        ay = -22;
        maxLife = crashDelay + 0.5 + Math.random() * 0.4;
      } else {
        const dir = new THREE.Vector3(Math.random()-0.5, Math.random()*0.9+0.1, Math.random()-0.5).normalize();
        const spd  = 10 + Math.random() * 20;
        vx = dir.x * spd; vy = dir.y * spd; vz = dir.z * spd;
        ay = -16;
        maxLife = 0.5 + Math.random() * 0.6;
      }

      fragments.push({
        mesh: tm,
        vx, vy, vz, ay,
        rx: (Math.random()-0.5)*8, ry: (Math.random()-0.5)*8, rz: (Math.random()-0.5)*8,
        life: maxLife, maxLife,
        crash, crashRef, crashDelay,
        crashTimer: crashDelay,
      });
      triCount++;
    }
  });
}

function updateFragments(dt){
  for(let i = fragments.length - 1; i >= 0; i--){
    const f = fragments[i];
    f.vy += f.ay * dt;
    f.mesh.position.x += f.vx * dt;
    f.mesh.position.y += f.vy * dt;
    f.mesh.position.z += f.vz * dt;
    f.mesh.rotation.x += f.rx * dt;
    f.mesh.rotation.y += f.ry * dt;
    f.mesh.rotation.z += f.rz * dt;
    f.life -= dt;

    // Bounce crash fragments off the ground so they visibly tumble
    if(f.crash && f.mesh.position.y < 0.3){
      f.mesh.position.y = 0.3;
      f.vy = Math.abs(f.vy) * 0.35;    // lose most energy on bounce
      f.vx *= 0.72;  f.vz *= 0.72;     // friction
    }

    // Timer-based crash explosion — fires once per robot via shared ref
    if(f.crash && !f.crashRef.done){
      f.crashTimer -= dt;
      if(f.crashTimer <= 0){
        f.crashRef.done = true;
        spawnExplosion(f.mesh.position.clone());
      }
    }
    const t = 1 - f.life / f.maxLife;
    f.mesh.material.opacity = Math.max(0, 1 - t * t);
    if(f.life <= 0 || f.mesh.position.y < -20){
      scene.remove(f.mesh); f.mesh.geometry.dispose(); f.mesh.material.dispose();
      fragments.splice(i, 1);
    }
  }
}

function exitCombatMode(){
  combatMode = false;
  parkState.phase = 'idle';
  parkState.timer = 0;
  // Release pointer lock
  if(document.pointerLockElement) document.exitPointerLock();
  // Hide HUD
  document.getElementById('combat-hud').classList.remove('on');
  document.getElementById('park-msg').textContent = '';
  // Reset combat input state
  for(const k in combatKeys) combatKeys[k] = false;
  rearView = false;
  // Clean up any live projectiles/explosions/fragments
  for(const p of projectiles){ scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); }
  projectiles.length = 0;
  for(const e of explosions) e.meshes.forEach(l => { scene.remove(l.mesh); l.mesh.geometry.dispose(); l.mesh.material.dispose(); });
  explosions.length = 0;
  for(const f of fragments){ scene.remove(f.mesh); f.mesh.geometry.dispose(); f.mesh.material.dispose(); }
  fragments.length = 0;
  // Restore autopilot velocity
  camVelZ = lerp(82, 140, lerp(0.55, 1.45, clamp(config.speed, 0, 1)));
}

// Combat input handlers (registered after renderer is created, in boot)
function initCombatInputs(){
  window.addEventListener('keydown', e => {
    if(!combatMode) return;
    combatKeys[e.code] = true;
    if(e.code === 'KeyR') rearView = true;
  });
  window.addEventListener('keyup', e => {
    combatKeys[e.code] = false;
    if(e.code === 'KeyR') rearView = false;
  });
  window.addEventListener('mousemove', e => {
    if(!combatMode || document.pointerLockElement !== renderer.domElement) return;
    mouseYaw   += e.movementX * 0.0018;
    mousePitch -= e.movementY * 0.0018;
    // Full Descent-style vertical freedom: ±90°
    mousePitch  = clamp(mousePitch, -Math.PI * 0.499, Math.PI * 0.499);
  });
  renderer.domElement.addEventListener('mousedown', e => {
    if(!combatMode) return;
    e.preventDefault();
    // Re-acquire lock if lost (e.g. user pressed Esc mid-session), else fire
    if(document.pointerLockElement !== renderer.domElement){
      renderer.domElement.requestPointerLock();
      return;
    }
    if(e.button === 0) fireLaser();
    if(e.button === 2) fireMissile();
  });
  renderer.domElement.addEventListener('contextmenu', e => {
    if(combatMode) e.preventDefault();
  });
  // Clear "CLICK TO ENGAGE" once pointer lock is acquired
  document.addEventListener('pointerlockchange', () => {
    if(document.pointerLockElement === renderer.domElement){
      document.getElementById('park-msg').textContent = '';
    }
  });
}

/* =========================
   Boot
========================= */
function boot(){
  resetWorld();
  resize();
  initCombatInputs();
  requestAnimationFrame(frame);
}

// ── Loading screen ────────────────────────────────────────────────────────────
{
  const loaderEl  = document.getElementById('loader');
  const loaderBar = document.getElementById('loader-bar');
  const loaderSub = document.getElementById('loader-sub');
  const total     = ROBOT_FILES.length + BUILDING_FILES.length;

  const iv = setInterval(() => {
    const loaded = robotModelsLoaded + buildingModelsLoaded;
    const pct    = total > 0 ? loaded / total : 1;
    loaderBar.style.width = Math.round(pct * 100) + '%';

    if(pct >= 1){
      clearInterval(iv);
      loaderSub.textContent = 'READY';
      setTimeout(() => {
        loaderEl.classList.add('fade-out');
        setTimeout(() => { loaderEl.style.display = 'none'; }, 950);
      }, 400);
    }
  }, 80);
}

// World boots immediately — assets stream in the background
boot();
