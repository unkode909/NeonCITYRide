<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Cyber Neon City Flyover</title>
  <style>
    @font-face {
      font-family: 'OCRA';
      src: url('./OCRACondensed.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    :root{
      --bg:#05040b;
      --panel: rgba(10, 12, 20, 0.72);
      --panel2: rgba(10, 12, 20, 0.90);
      --stroke: rgba(130, 236, 114, 0.35);
      --stroke2: rgba(111, 66, 193, 0.35);
      --text: rgba(230, 240, 255, 0.86);
      --muted: rgba(230, 240, 255, 0.55);
      --cyan: rgba(90, 245, 255, 1);
      --mag: rgba(255, 75, 245, 1);
      --vio: rgba(172, 120, 255, 1);
      --amb: rgba(255, 190, 92, 1);
    }
    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background: #05040b;
      color: var(--text);
      font-family: 'OCRA', ui-monospace, monospace;
      user-select:none;
    }
    #wrap{
      position:fixed;
      inset:0;
    }
    canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    /* UI */
    #ui{
      position:fixed;
      left:14px;
      top:14px;
      width: 320px;
      max-width: calc(100vw - 28px);
      padding: 12px 12px 10px 12px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(20, 14, 34, 0.72), rgba(8, 10, 18, 0.70));
      border: 1px solid rgba(130, 236, 114, 0.22);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events:auto;
    }
    #ui{ display:none; }
    #ui.visible{ display:block; }

    #menuToggle{
      position:fixed;
      left:14px;
      top:14px;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(130,236,114,0.28);
      background: linear-gradient(180deg, rgba(20,14,34,0.80), rgba(8,10,18,0.78));
      box-shadow: 0 6px 20px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: rgba(230,240,255,0.88);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      z-index: 10;
      padding: 0;
      transition: border-color 0.15s;
    }
    #menuToggle:hover{ border-color: rgba(130,236,114,0.55); }
    #menuToggle:active{ transform: translateY(1px); }

    #closeMenu{
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: rgba(230,240,255,0.85);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: none;
    }
    #closeMenu:hover{ background: rgba(255,80,80,0.18); border-color: rgba(255,80,80,0.35); }
    #ui .hdr{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom: 8px;
      gap: 10px;
    }
    #ui .title{
      font-size: 13px;
      letter-spacing: 0.08em;
      color: rgba(230,240,255,0.92);
      text-transform: uppercase;
      display:flex;
      align-items:center;
      gap: 8px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(111,66,193,0.25);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    #ui .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .row{
      display:grid;
      grid-template-columns: 88px 1fr 44px;
      align-items:center;
      gap: 8px;
    }
    .lbl{
      font-size: 12px;
      color: rgba(230,240,255,0.72);
    }
    input[type="range"]{
      width:100%;
      accent-color: #82EC72;
      cursor:pointer;
    }
    .val{
      text-align:right;
      font-size: 12px;
      color: rgba(230,240,255,0.62);
    }
    .btns{
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    button{
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.03em;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(130,236,114,0.22);
      background: rgba(0,0,0,0.22);
      color: rgba(230,240,255,0.82);
      cursor:pointer;
      box-shadow: 0 10px 26px rgba(0,0,0,0.20), inset 0 0 0 1px rgba(255,255,255,0.03);
    }
    button:hover{
      border-color: rgba(130,236,114,0.36);
      background: rgba(0,0,0,0.26);
    }
    button:active{
      transform: translateY(1px);
    }
    button.primary{
      border-color: rgba(130,236,114,0.38);
      background: linear-gradient(180deg, rgba(130,236,114,0.16), rgba(0,0,0,0.20));
    }
    button.warn{
      border-color: rgba(255,190,92,0.28);
      background: linear-gradient(180deg, rgba(255,190,92,0.14), rgba(0,0,0,0.20));
    }
    .foot{
      margin-top: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      color: rgba(230,240,255,0.52);
      font-size: 11px;
      line-height: 1.2;
    }
    .kbd{
      color: rgba(230,240,255,0.72);
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 7px;
      margin-right: 6px;
      white-space: nowrap;
    }

    #hud{
      position:fixed;
      right: 14px;
      top: 14px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(0,0,0,0.20);
      border: 1px solid rgba(111,66,193,0.25);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(255,255,255,0.03);
      color: rgba(230,240,255,0.75);
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
      display:none;
      pointer-events:none;
      z-index:10;
    }
    #hud.on{ display:block; }
    #hud .small{ color: rgba(230,240,255,0.58); }

    #fps-corner{
      position:fixed; bottom:8px; right:10px;
      color: #00cc44;
      font-size:12px; font-family:'OCR A Extended','OCR A','OCRA','Courier New',monospace;
      letter-spacing:0.05em;
      pointer-events:none; z-index:10;
    }

    /* ── Combat HUD ─────────────────────────────────────────────── */
    #combat-hud{
      display:none; position:fixed; inset:0;
      pointer-events:none; z-index:200;
    }
    #combat-hud.on{ display:block; }
    .reticle{
      position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:120px; height:120px;
    }
    .r-ring{
      position:absolute; inset:0;
      border-radius:50%;
      border:1.5px solid rgba(0,255,200,0.55);
    }
    .r-ring.spin{ animation:rspin 6s linear infinite; }
    @keyframes rspin{ to{ transform:rotate(360deg); } }
    .r-ring.inner-ring{
      inset:20px;
      border-color:rgba(0,220,255,0.35);
      animation:none;
    }
    .r-diamond{
      position:absolute; left:50%; top:50%;
      width:12px; height:12px;
      border:1.5px solid rgba(0,255,200,0.9);
      transform:translate(-50%,-50%) rotate(45deg);
    }
    .r-tl,.r-tr,.r-bl,.r-br{
      position:absolute; width:14px; height:14px;
      border-color:rgba(0,255,200,0.8); border-style:solid;
    }
    .r-tl{ top:0;    left:0;   border-width:2px 0 0 2px; }
    .r-tr{ top:0;    right:0;  border-width:2px 2px 0 0; }
    .r-bl{ bottom:0; left:0;   border-width:0 0 2px 2px; }
    .r-br{ bottom:0; right:0;  border-width:0 2px 2px 0; }
    .r-dot{
      position:absolute; left:50%; top:50%;
      width:4px; height:4px;
      background:rgba(0,255,200,0.9);
      border-radius:50%;
      transform:translate(-50%,-50%);
    }
    #park-msg{
      position:absolute; bottom:22%; width:100%;
      text-align:center; font-family:'OCRA', monospace;
      font-size:13px; letter-spacing:0.18em;
      color:rgba(0,255,200,0.9);
      text-shadow:0 0 8px rgba(0,255,200,0.7);
    }

    /* ── Loading screen ───────────────────────────────────────────── */
    #loader{
      position:fixed; inset:0; z-index:9999;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#05040b;
      transition: opacity 0.9s ease;
    }
    #loader.fade-out{ opacity:0; pointer-events:none; }
    #loader-title{
      font-family:'OCRA', monospace;
      font-size: clamp(18px, 4vw, 38px);
      letter-spacing: 0.22em;
      color: rgba(0,255,200,0.92);
      text-shadow: 0 0 18px rgba(0,255,200,0.55), 0 0 50px rgba(0,200,255,0.25);
      margin-bottom: 38px;
      text-align: center;
      padding: 0 20px;
    }
    #loader-bar-wrap{
      width: min(340px, 70vw);
      height: 3px;
      background: rgba(0,255,200,0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    #loader-bar{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(0,200,255,0.7), rgba(0,255,200,1));
      box-shadow: 0 0 8px rgba(0,255,200,0.7);
      transition: width 0.18s ease;
      border-radius: 2px;
    }
    #loader-sub{
      font-family:'OCRA', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(0,255,200,0.38);
      margin-top: 16px;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loader">
    <div id="loader-title">NEON CITY<br>RACE</div>
    <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
    <div id="loader-sub">LOADING ASSETS&hellip;</div>
  </div>

  <div id="wrap"></div>

  <button id="menuToggle" title="Paramètres">&#9776;</button>

  <div id="ui">
    <div class="hdr">
      <div class="title">
        <span class="pill">CYBER CITY FLYOVER</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="pill" id="qLabel">Quality: AUTO</div>
        <button id="closeMenu" title="Fermer">&#10005;</button>
      </div>
    </div>

    <div class="grid">
      <div class="row">
        <div class="lbl">Speed</div>
        <input id="sSpeed" type="range" min="0" max="1" step="0.001" value="0.27" />
        <div class="val" id="vSpeed">0.27</div>
      </div>
      <div class="row">
        <div class="lbl">Traffic</div>
        <input id="sTraffic" type="range" min="0" max="1" step="0.001" value="0.30" />
        <div class="val" id="vTraffic">0.30</div>
      </div>
      <div class="row">
        <div class="lbl">Flying</div>
        <input id="sFlying" type="range" min="0" max="1" step="0.001" value="0.8" />
        <div class="val" id="vFlying">0.8</div>
      </div>
      <div class="row">
        <div class="lbl">Bloom</div>
        <input id="sBloom" type="range" min="0" max="1" step="0.001" value="0.50" />
        <div class="val" id="vBloom">0.50</div>
      </div>
      <div class="row">
        <div class="lbl">Fog</div>
        <input id="sFog" type="range" min="0" max="1" step="0.001" value="0.50" />
        <div class="val" id="vFog">0.20</div>
      </div>
      <div class="row">
        <div class="lbl">Particles</div>
        <input id="sParts" type="range" min="0" max="1" step="0.001" value="0" />
        <div class="val" id="vParts">0</div>
      </div>
      <div class="row">
        <div class="lbl">Curviness</div>
        <input id="sCurve" type="range" min="0" max="1" step="0.01" value="0.40" />
        <div class="val" id="vCurve">28°</div>
      </div>
    </div>

    <div class="btns">
      <button class="primary" id="bPause">Pause</button>
      <button id="bReset" class="warn">Reset Seed</button>
      <button id="bFS">Fullscreen</button>
      <button id="bQuality">Quality Auto</button>
      <button id="bHUD">Stats</button>
    </div>

    <div class="foot">
      <div>
        <span class="kbd">H</span>UI
        <span class="kbd">Space</span>Pause
        <span class="kbd">F</span>FS
        <span class="kbd">R</span>Seed
      </div>
      <div>
        <span class="kbd">1</span>High
        <span class="kbd">2</span>Med
        <span class="kbd">3</span>Low
        <span class="kbd">4</span>Auto
      </div>
    </div>
  </div>

  <div id="hud"></div>
  <div id="fps-corner">-- fps</div>

  <div id="combat-hud">
    <div class="reticle">
      <div class="r-ring spin"></div>
      <div class="r-ring inner-ring"></div>
      <div class="r-diamond"></div>
      <div class="r-tl"></div><div class="r-tr"></div>
      <div class="r-bl"></div><div class="r-br"></div>
      <div class="r-dot"></div>
    </div>
    <div id="park-msg"></div>
  </div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

"use strict";

/* =========================
   Utilities
========================= */
const TAU = Math.PI * 2;
const DEG = Math.PI / 180;

function clamp(v, a, b){ return v < a ? a : (v > b ? b : v); }
function lerp(a,b,t){ return a + (b-a)*t; }
function smoothstep(a,b,t){ t = clamp((t-a)/(b-a), 0, 1); return t*t*(3-2*t); }
function fract(x){ return x - Math.floor(x); }
function now(){ return (performance && performance.now) ? performance.now() : Date.now(); }

function u32(x){ return x >>> 0; }
function hash32(x){
  x = u32(x);
  x ^= x >>> 16; x = u32(x * 0x7feb352d);
  x ^= x >>> 15; x = u32(x * 0x846ca68b);
  x ^= x >>> 16;
  return u32(x);
}
function fhash01(x){
  return (hash32(x) & 0xFFFFFF) / 0x1000000;
}

function makeRng(seed){
  let s = u32(seed || 1);
  return {
    nextU32(){
      s ^= s << 13; s = u32(s);
      s ^= s >>> 17; s = u32(s);
      s ^= s << 5; s = u32(s);
      return s;
    },
    next(){
      return (this.nextU32() & 0xFFFFFF) / 0x1000000;
    },
    range(a,b){
      return a + (b-a)*this.next();
    },
    irange(a,b){
      return (a + Math.floor(this.next() * (b-a+1)))|0;
    },
    pick(arr){
      return arr[(this.next() * arr.length)|0];
    }
  };
}

function noise1D(x, seed){
  const xi = Math.floor(x);
  const t = x - xi;
  const a = fhash01(hash32(u32(xi) ^ u32(seed)));
  const b = fhash01(hash32(u32(xi+1) ^ u32(seed)));
  const u = t*t*(3-2*t);
  return lerp(a,b,u);
}

function fbm1D(x, seed){
  let v = 0, a = 0.5, f = 1.0;
  for(let i=0;i<4;i++){
    v += a * (noise1D(x*f, seed + i*1013) * 2 - 1);
    f *= 2.02;
    a *= 0.5;
  }
  return v;
}

function randSeed(){
  try{
    const a = new Uint32Array(2);
    crypto.getRandomValues(a);
    return u32(a[0] ^ (a[1] * 0x9e3779b1));
  }catch(_e){
    return u32((Date.now() * 2654435761) ^ ((Math.random() * 0xFFFFFFFF)>>>0));
  }
}

/* =========================
   Quality + Config
========================= */
const QUALITY = { AUTO:0, HIGH:1, MED:2, LOW:3 };

const qualityPresets = {
  [QUALITY.HIGH]: { maxChunks:22, buildingsPerChunk:52, lampsPerChunk:26, dronesPerChunk:11, maxGroundCars:104, maxFlyingCars:1800, maxRobots:900, maxParticles:980 },
  [QUALITY.MED]:  { maxChunks:18, buildingsPerChunk:36, lampsPerChunk:18, dronesPerChunk:7,  maxGroundCars:82,  maxFlyingCars:1400, maxRobots:700, maxParticles:700 },
  [QUALITY.LOW]:  { maxChunks:14, buildingsPerChunk:24, lampsPerChunk:12, dronesPerChunk:4,  maxGroundCars:54,  maxFlyingCars:900,  maxRobots:450, maxParticles:420 }
};

const config = {
  speed: 0.27,
  traffic: 0.30,
  flying: 0.8,
  bloom: 0.32,
  fog: 0.50,
  particles: 0.0,
  curviness: 0.40,
  showHud: false,
  paused: false,
  uiVisible: false,
  qualityMode: QUALITY.AUTO,
  qualityStep: QUALITY.MED,
};

const ui = document.getElementById("ui");
const hud = document.getElementById("hud");
const qLabel = document.getElementById("qLabel");
const fpsCorner = document.getElementById("fps-corner");

function currentPreset(){
  const mode = (config.qualityMode === QUALITY.AUTO) ? config.qualityStep : config.qualityMode;
  return qualityPresets[mode] || qualityPresets[QUALITY.MED];
}

function setQualityMode(mode){
  config.qualityMode = mode;
  const labels = { [QUALITY.AUTO]:"Quality: AUTO", [QUALITY.HIGH]:"Quality: HIGH", [QUALITY.MED]:"Quality: MED", [QUALITY.LOW]:"Quality: LOW" };
  const btns   = { [QUALITY.AUTO]:"Quality Auto",  [QUALITY.HIGH]:"Quality High",  [QUALITY.MED]:"Quality Med",  [QUALITY.LOW]:"Quality Low"  };
  qLabel.textContent = labels[mode] || "Quality: AUTO";
  document.getElementById("bQuality").textContent = btns[mode] || "Quality Auto";
}

function cycleQualityButton(){
  const t = document.getElementById("bQuality").textContent;
  if(t.includes("Auto")) setQualityMode(QUALITY.HIGH);
  else if(t.includes("High")) setQualityMode(QUALITY.MED);
  else if(t.includes("Med")) setQualityMode(QUALITY.LOW);
  else setQualityMode(QUALITY.AUTO);
}

/* =========================
   World constants
========================= */
let SEED = randSeed();
let rng = makeRng(SEED);

const WORLD = {
  cityHalfW: 290,
  far: 1600,
  near: 7,
  chunkLen: 210,
  roadWidth: 22,
  roadGap: 62,
  lanes: 3,
  laneW: 22 / 3,
  sidewalk: 6,
  baseCamY: 62,
};

const neon = [
  [90, 245, 255],   // cyan
  [255, 75, 245],   // magenta
  [172, 120, 255],  // violet
  [92, 140, 255],   // blue
  [255, 190, 92],   // amber
  [255, 72, 88],    // red-hot
  [72, 255, 168],   // jade
  [255, 140, 40],   // deep orange
];

// Convert neon [r,g,b] to THREE.Color
function neonColor(n){ return new THREE.Color(n[0]/255, n[1]/255, n[2]/255); }

/* =========================
   Camera state
========================= */
const cam = {
  x: 0,
  y: WORLD.baseCamY,
  z: 0,
  yaw: 0,
  pitch: -12 * DEG,
  roll: 0
};

let camVelZ = 95;
let tAccum = 0;

// ── Combat mode state ────────────────────────────────────────────────────────
let combatMode = false;
let rearView   = false;
let missileAlt = 0;
const parkState  = { phase: 'idle', timer: 0, targetX: 0 };
const combatKeys = {};
let mouseYaw = 0, mousePitch = 0;
const projectiles = [];
const explosions  = [];
const fragments   = [];

// Per-frame spineX cache
const _spineCache = new Map();
function spineX(z){
  const cv = config.curviness * 5;
  const a = fbm1D(z * 0.0016, SEED ^ 0xA1B2C3D4) * 48 * cv;
  const b = fbm1D(z * 0.00055 + 50, SEED ^ 0x1234ABCD) * 75 * cv;
  return a + b * 0.25;
}
function spineXC(z){
  let v = _spineCache.get(z);
  if(v === undefined){ v = spineX(z); _spineCache.set(z, v); }
  return v;
}
function spineSway(z){
  return fbm1D(z * 0.0022 + 133.7, SEED ^ 0x77CC33AA) * 10 * config.curviness * 5;
}

/* =========================
   Three.js setup
========================= */
const renderer = new THREE.WebGLRenderer({ antialias: false }); // SMAA handles AA in post
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.0));        // 1:1 pixel ratio — post passes are expensive
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.35;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('wrap').appendChild(renderer.domElement);

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0x1a040f, WORLD.near, WORLD.far * 0.85);

   Star field (static points on far sphere)
========================= */
const _starsMesh = (function buildStars(){
  const N = 3800;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const R = 1100;
  for(let i = 0; i < N; i++){
    // Deterministic position using seed-based hash
    const u = fhash01(hash32(u32(SEED ^ 0xA3F1 ^ u32(i*17+1))));
    const v = fhash01(hash32(u32(SEED ^ 0xB5C2 ^ u32(i*31+3))));
    const theta = u * TAU;
    // Stars spread from near-horizon (~6°) up to zenith so they fill the black sky
    const phi   = Math.acos(0.10 + v * 0.90);
    pos[i*3]   = R * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = R * Math.cos(phi) + 20;
    pos[i*3+2] = R * Math.sin(phi) * Math.sin(theta);
    // Brightness: power-biased so most stars are dim, few are brilliant
    const brRaw = fhash01(hash32(u32(SEED ^ u32(i*71))));
    const br    = 0.10 + Math.pow(brRaw, 2.2) * 0.90;  // 0.10 (dim) → 1.00 (bright)
    const warm  = fhash01(hash32(u32(SEED ^ u32(i*137))));
    if(warm > 0.88){
      col[i*3]   = br;           // warm reddish (atmospheric refraction)
      col[i*3+1] = br * 0.60;
      col[i*3+2] = br * 0.30;
    } else {
      col[i*3]   = br * 0.85;   // cool blue-white
      col[i*3+1] = br * 0.90;
      col[i*3+2] = br;
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size: 1.6, vertexColors: true, sizeAttenuation: false, fog: false });
  const stars = new THREE.Points(geo, mat);
  stars.frustumCulled = false;
  scene.add(stars);
  return stars;
})();

/* =========================
   80s Retro Sunset Sky Dome
   — posterised banded gradient, deep violet zenith → gold horizon
========================= */
const skyDome = (() => {
  const geo = new THREE.SphereGeometry(1050, 48, 24);
  const mat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    depthTest: false,
    uniforms: {},
    vertexShader: `
      varying float vElev;
      void main(){
        vElev = normalize(position).y;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying float vElev;
      void main(){
        // vElev: -1 (nadir) → 0 (equator) → +1 (zenith)
        // Camera sits at y=62, pitch -11.5°.
        // The actual open sky visible to the camera lives in a narrow band:
        //   e ≈ 0.51 (just above visual horizon / building tops)
        //   e ≈ 0.70 (top of viewport)
        // We map this precisely:
        //   — thin sunset glow : e 0.49 → 0.58  (≈ bottom 25% of visible sky)
        //   — night sky        : e 0.58 → 1.00  (≈ top    75% of visible sky)
        float e = clamp(vElev * 0.5 + 0.5, 0.0, 1.0);

        const float GLOW_LO  = 0.49;   // base of sunset glow strip
        const float GLOW_HI  = 0.530;  // top  of sunset glow strip (thinner)

        vec3 col;

        if(e < GLOW_LO){
          // Sub-horizon / fog zone — dark warm base (mostly hidden by ground mesh)
          col = vec3(0.07, 0.01, 0.04);

        } else if(e < GLOW_HI){
          // ── Thin sunset glow strip ── 9 hard-edge bands, CGA style ──
          float t = (e - GLOW_LO) / (GLOW_HI - GLOW_LO);  // 0 → 1
          float s = floor(t * 9.0) / 9.0;

          // Near-horizon glow (s=0) → magenta upper edge (s=1)
          if      (s >= 0.889) col = vec3(0.52, 0.06, 0.42);  // magenta cap
          else if (s >= 0.778) col = vec3(0.70, 0.10, 0.22);  // red-magenta
          else if (s >= 0.667) col = vec3(0.84, 0.18, 0.05);  // burnt crimson
          else if (s >= 0.556) col = vec3(0.92, 0.35, 0.03);  // deep orange
          else if (s >= 0.444) col = vec3(0.97, 0.55, 0.06);  // orange
          else if (s >= 0.333) col = vec3(0.99, 0.72, 0.13);  // amber
          else if (s >= 0.222) col = vec3(1.00, 0.88, 0.36);  // pale gold
          else if (s >= 0.111) col = vec3(1.00, 0.95, 0.62);  // warm cream
          else                  col = vec3(1.00, 0.98, 0.82);  // near-white horizon glow

        } else {
          // ── Night sky ── true deep black, only the lowest band eases from glow ──
          float t = clamp((e - GLOW_HI) / (1.0 - GLOW_HI), 0.0, 1.0);
          float s = floor(t * 5.0) / 5.0;

          if      (s >= 0.800) col = vec3(0.000, 0.000, 0.000);  // pure black
          else if (s >= 0.600) col = vec3(0.003, 0.000, 0.005);  // near-black
          else if (s >= 0.400) col = vec3(0.006, 0.000, 0.010);  // barely there indigo
          else if (s >= 0.200) col = vec3(0.012, 0.001, 0.020);  // very dark violet
          else                  col = vec3(0.016, 0.001, 0.026);  // dark — no visible purple jump
        }

        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = -100;
  mesh.frustumCulled = false;
  mesh.userData.isSky = true;
  scene.add(mesh);
  return mesh;
})();


/* =========================
   Background City Silhouettes
   — InstancedMesh ring hiding the horizon behind the foreground buildings.
   — Follows camera XZ each frame (like skyDome).  No windows, no neon.
========================= */
const bgCity = (() => {
  // 2 fixed-depth rows per arc × 2 arcs = 320 instances
  const COUNT   = 320;
  const HALF    = COUNT >> 1;   // 160 per arc
  const QUARTER = HALF  >> 1;   // 80 per row (near / far) — dense overlap across ~950u arc
  const geo   = new THREE.PlaneGeometry(1, 1);

  const matFront = new THREE.MeshBasicMaterial({
    color: new THREE.Color(0x07050b),
    side: THREE.DoubleSide,
    fog: true,
  });
  const matSide = new THREE.MeshBasicMaterial({
    color: new THREE.Color(0x0e0b13),
    side: THREE.DoubleSide,
    fog: true,
  });

  const bgFront = new THREE.InstancedMesh(geo, matFront, COUNT);
  const bgSide  = new THREE.InstancedMesh(geo, matSide,  COUNT);
  for(const m of [bgFront, bgSide]){
    m.frustumCulled = false;
    m.castShadow    = false;
    m.receiveShadow = false;
    scene.add(m);
  }

  const rng0 = makeRng(hash32(u32(SEED ^ 0xB6C1D9F0)));
  const dummy = new THREE.Object3D();
  const HALF_ARC = 55 * (Math.PI / 180);

  for(let i = 0; i < COUNT; i++){
    const base   = (i < HALF) ? 0 : Math.PI;           // left or right arc
    const isNear = (i % HALF) < QUARTER;
    const shell  = isNear ? 580 : 760;                  // 2 fixed depth rows
    const t      = (i % QUARTER) / (QUARTER - 1);      // 0..1 evenly across arc
    const angle  = base + (t * 2 - 1) * HALF_ARC;

    const h  = 22 + Math.pow(rng0.next(), 0.55) * 80;   // 22–102 u tall
    const w  = 18 + rng0.next() * 16;                   // 18–34 u wide
    const dv = 8  + rng0.next() * 14;
    const x  = Math.cos(angle) * shell;
    const z  = Math.sin(angle) * shell;
    const y  = h * 0.5;

    dummy.position.set(x, y, z);
    dummy.scale.set(w, h, 1);
    dummy.lookAt(0, y, 0);
    dummy.updateMatrix();
    bgFront.setMatrixAt(i, dummy.matrix);

    dummy.position.set(x, y, z);
    dummy.scale.set(dv, h, 1);
    dummy.lookAt(0, y, 0);
    dummy.rotateY(Math.PI / 2);
    dummy.updateMatrix();
    bgSide.setMatrixAt(i, dummy.matrix);
  }
  bgFront.instanceMatrix.needsUpdate = true;
  bgSide.instanceMatrix.needsUpdate  = true;

  return { front: bgFront, side: bgSide };
})();

/* Forward-horizon silhouette ring — cheap 2D planes that follow the camera,
   always 400–1400 u ahead, giving infinite-city depth with zero chunk cost. */
const bgFwd = (() => {
  // 2 fixed-depth rows × 11 planes = 22 instances (was 280)
  const COUNT   = 22;
  const PER_ROW = 11;
  const geo = new THREE.PlaneGeometry(1, 1);

  const matFront = new THREE.MeshBasicMaterial({
    color: new THREE.Color(0x06040a),
    side: THREE.DoubleSide,
    fog: true,
  });
  const matSide = new THREE.MeshBasicMaterial({
    color: new THREE.Color(0x0d0a12),
    side: THREE.DoubleSide,
    fog: true,
  });

  const fwdF = new THREE.InstancedMesh(geo, matFront, COUNT);
  const fwdS = new THREE.InstancedMesh(geo, matSide,  COUNT);
  for(const m of [fwdF, fwdS]){
    m.frustumCulled = false;
    m.castShadow    = false;
    m.receiveShadow = false;
    scene.add(m);
  }

  const rng0  = makeRng(hash32(u32(SEED ^ 0xD3E4F501)));
  const dummy = new THREE.Object3D();
  const ARC    = Math.PI / 2;
  const SPREAD = 10 * (Math.PI / 180);

  for(let i = 0; i < COUNT; i++){
    const isNear = i < PER_ROW;
    const shell  = isNear ? 1900 : 3000;               // 2 fixed depth rows
    const t      = (i % PER_ROW) / (PER_ROW - 1);     // 0..1 evenly across ±10° arc
    const angle  = ARC + (t * 2 - 1) * SPREAD;

    const h  = 40 + Math.pow(rng0.next(), 0.40) * 110; // 40–150 u
    const w  = isNear ? 30 + rng0.next() * 25 : 50 + rng0.next() * 35; // 30–55u near, 50–85u far
    const dv = 8 + rng0.next() * 16;

    const x = Math.cos(angle) * shell;
    const z = Math.sin(angle) * shell;
    const y = h * 0.5;

    dummy.position.set(x, y, z);
    dummy.scale.set(w, h, 1);
    dummy.lookAt(0, y, 0);
    dummy.updateMatrix();
    fwdF.setMatrixAt(i, dummy.matrix);

    dummy.position.set(x, y, z);
    dummy.scale.set(dv, h, 1);
    dummy.lookAt(0, y, 0);
    dummy.rotateY(Math.PI / 2);
    dummy.updateMatrix();
    fwdS.setMatrixAt(i, dummy.matrix);
  }

  fwdF.instanceMatrix.needsUpdate = true;
  fwdS.instanceMatrix.needsUpdate = true;

  return { front: fwdF, side: fwdS };
})();

function buildRoadGeometry(){
  const halfW  = WORLD.roadWidth * 0.5 * 1.40;
  const zStart = cam.z - 80;
  const zEnd   = cam.z + WORLD.far + 80;
  const step   = 10;
  const N = Math.ceil((zEnd - zStart) / step);

  const pos = new Float32Array((N+1) * 2 * 3);
  const uvs = new Float32Array((N+1) * 2 * 2);
  const idx = [];

  for(let i = 0; i <= N; i++){
    const z  = zStart + i * step;
    const x  = spineX(z);
    const dx = spineX(z + 1) - x;
    const nx = -dx, nz = 1, l = Math.hypot(nx, nz);
    const base = i * 6;
    pos[base]   = x + (nx/l)*halfW; pos[base+1] = 0.02; pos[base+2] = z;
    pos[base+3] = x - (nx/l)*halfW; pos[base+4] = 0.02; pos[base+5] = z;
    uvs[i*4]   = 0; uvs[i*4+1] = i * step / WORLD.chunkLen;
    uvs[i*4+2] = 1; uvs[i*4+3] = uvs[i*4+1];
    if(i < N){
      const a=i*2,b=a+1,c=a+2,d=a+3;
      idx.push(a,c,b, b,c,d);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('uv',       new THREE.BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

function rebuildRoad(){
  const geo = buildRoadGeometry();
  if(roadMesh){
    roadMesh.geometry.dispose();
    roadMesh.geometry = geo;
  } else {
    roadMesh = new THREE.Mesh(geo, roadMat);
    roadMesh.receiveShadow = false;
    roadMesh.frustumCulled = false;
    scene.add(roadMesh);
  }
}

const _frameMats = new Map();
function getFrameMaterial(neonArr){
  const key = neon.indexOf(neonArr);
  if(_frameMats.has(key)) return _frameMats.get(key);
  const nc = neonColor(neonArr);
  const mat = new THREE.LineBasicMaterial({
    color: new THREE.Color(nc.r * 5, nc.g * 5, nc.b * 5)
  });
  _frameMats.set(key, mat);
  return mat;

// Build a flat rectangle perimeter as LineSegments geometry (4 segments, no diagonals).
function makeFrameRect(w, d){
  const hw = w * 0.5, hd = d * 0.5;
  const pos = new Float32Array([
    -hw, 0, -hd,   hw, 0, -hd,
     hw, 0, -hd,   hw, 0,  hd,
     hw, 0,  hd,  -hw, 0,  hd,
    -hw, 0,  hd,  -hw, 0, -hd,
  ]);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  return geo;
}

// n-sided polygon perimeter as LineSegments geometry — for octagonal/cylindrical neon caps.
function makeFramePolygon(r, n){
  const pts = [];
  for(let i = 0; i < n; i++){
    const a0 = (i / n) * Math.PI * 2;
    const a1 = ((i + 1) / n) * Math.PI * 2;
    pts.push(Math.cos(a0)*r, 0, Math.sin(a0)*r,
             Math.cos(a1)*r, 0, Math.sin(a1)*r);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pts), 3));
  return geo;
}

// Add box geometry to a batch collector (for merged building bodies)
// C = { bPos, bCol, bIdx, bv } arrays
function _batchBox(C, cx, cy, cz, w, h, d, r, g, b){
  const hw=w*.5, hh=h*.5, hd=d*.5, v0=C.bv;
  C.bPos.push(
    cx-hw,cy-hh,cz-hd, cx+hw,cy-hh,cz-hd, cx+hw,cy+hh,cz-hd, cx-hw,cy+hh,cz-hd,
    cx-hw,cy-hh,cz+hd, cx+hw,cy-hh,cz+hd, cx+hw,cy+hh,cz+hd, cx-hw,cy+hh,cz+hd
  );
  for(let i=0;i<8;i++) C.bCol.push(r,g,b);
  C.bIdx.push(
    v0,v0+2,v0+1, v0,v0+3,v0+2,
    v0+5,v0+7,v0+4, v0+5,v0+6,v0+7,
    v0+4,v0+3,v0, v0+4,v0+7,v0+3,
    v0+1,v0+6,v0+5, v0+1,v0+2,v0+6,
    v0+4,v0+1,v0+5, v0+4,v0,v0+1,
    v0+3,v0+6,v0+2, v0+3,v0+7,v0+6
  );
  C.bv+=8;
}

// Add a rectangle neon cap (4 line segments) to the cap batch collector
// C = { lPos, lCol }
function _batchCapRect(C, x, y, bz, w, d, nr, ng, nb){
  const hw=(w+0.4)*.5, hd=(d+0.4)*.5;
  C.lPos.push(
    x-hw,y,bz-hd, x+hw,y,bz-hd,
    x+hw,y,bz-hd, x+hw,y,bz+hd,
    x+hw,y,bz+hd, x-hw,y,bz+hd,
    x-hw,y,bz+hd, x-hw,y,bz-hd
  );
  for(let i=0;i<8;i++) C.lCol.push(nr,ng,nb);
}

  new THREE.Color(0.15, 0.15, 0.16),
];

// Single shared window material.
// MeshBasicMaterial outputs vertex colours directly as pixel colour — no lighting math,
// no albedo multiplication. Vertex colour IS the emissive output, bloom works correctly.
const _winMat = new THREE.MeshBasicMaterial({
  vertexColors: true,
  side: THREE.DoubleSide,
  fog: true,
});

// Shared lamp-head material — vertex colour carries the neon tint, bloom picks it up.
const _lampHeadMat = new THREE.MeshBasicMaterial({ vertexColors: true, fog: true });

// 6-entry palette of realistic city-night window tints
const WIN_TINTS = [
  [1.00, 0.90, 0.72],  // warm incandescent
  [0.82, 0.94, 1.00],  // cool fluorescent / office
  [1.00, 0.78, 0.42],  // deep amber / restaurant
  [0.96, 0.96, 1.00],  // neutral white / corporate
  [1.00, 0.96, 0.68],  // pale yellow / residential
  [0.72, 0.86, 1.00],  // blue-white / industrial
];

/* =========================
   Chunk system
========================= */
const chunkPool = [];
const chunks = [];

function makeChunk(){
  return {
    id: 0, z0: 0, z1: 0,
    buildings: [], lamps: [], drones: [],
    _sorted: false,
    _meshes: []
  };
}

function generateChunk(ch){
  ch.buildings.length = 0;
  ch.lamps.length = 0;
  ch.drones.length = 0;
  ch._sorted = false;

  const preset = currentPreset();
  const cr = makeRng(hash32(u32(SEED) ^ u32(ch.id * 1337)));

  const zMid = (ch.z0 + ch.z1) * 0.5;
  const roads = [{ off: 0, w: WORLD.roadWidth * 1.15 }];
  const district = clamp((fbm1D(zMid * 0.0008 + 2.0, SEED ^ 0x55AA77CC) + 1) * 0.5, 0, 1);
  const density = lerp(0.65, 1.2, district);
  const targetBuildings = Math.max(18, Math.floor(preset.buildingsPerChunk * density));
  let attempts = targetBuildings * 5;

  function roadClear(x,z, pad){
    const c = spineX(z);
    for(let k=0;k<roads.length;k++){
      const rx = c + roads[k].off;
      const w = roads[k].w;
      if(Math.abs(x - rx) < (w*0.5 + WORLD.sidewalk + pad)) return false;
    }
    return true;
  }

  for(let i=0; i<targetBuildings && attempts>0; ){
    attempts--;
    const z = cr.range(ch.z0 + 10, ch.z1 - 10);
    const spread = lerp(0.85, 1.15, cr.next());
    const cityW = WORLD.cityHalfW * spread;
    const x = cr.range(-cityW, cityW);
    const w = cr.range(18, cr.next() < 0.30 ? 68 : 44);
    const d = cr.range(18, cr.next() < 0.30 ? 72 : 48);
    const hBase = lerp(18, 210, Math.pow(cr.next(), lerp(2.6, 1.5, district)));
    const antenna = (cr.next() < 0.25) ? cr.range(6, 38) : 0;
    const h = hBase + antenna;

    if(Math.abs(x) < 18 && cr.next() < 0.35) continue;
    if(!roadClear(x, z, w*0.85 + 12)) continue;
    if(Math.abs(x) > cityW - 10) continue;

    const style = cr.irange(0, 4);
    const huePick = cr.irange(0, neon.length - 1);
    const neonCol = neon[huePick];
    const winSeed = cr.nextU32();

    const sbRng = makeRng(winSeed ^ 0xBEEF1234);
    const hasSetback  = h > 52 && sbRng.next() < 0.60;
    const sbY1        = hasSetback ? h * sbRng.range(0.42, 0.65) : h;
    const sbDX        = hasSetback ? w * sbRng.range(0.10, 0.22) : 0;
    const sbDZ        = hasSetback ? d * sbRng.range(0.08, 0.18) : 0;
    const hasSetback2 = hasSetback && h > 95 && sbRng.next() < 0.45;
    const sbY2        = hasSetback2 ? sbY1 + (h - sbY1) * sbRng.range(0.38, 0.58) : h;
    const sbDX2       = hasSetback2 ? sbDX + w * sbRng.range(0.06, 0.12) : sbDX;
    const sbDZ2       = hasSetback2 ? sbDZ + d * sbRng.range(0.04, 0.08) : sbDZ;

    // ~55% chance of using a GLB reactor building instead of procedural geometry
    const glbIdx = (cr.next() < 0.55) ? cr.irange(0, BUILDING_FILES.length - 1) : -1;

    const shapeSeed = fhash01(hash32(u32(winSeed ^ 0x1A2B3C4D)));
    const shapeType = shapeSeed < 0.08 ? 0   // standard box
                    : shapeSeed < 0.11 ? 1   // octagonal
                    : shapeSeed < 0.14 ? 2   // cylindrical
                    : shapeSeed < 0.17 ? 3   // L-shape
                    : shapeSeed < 0.20 ? 4   // podium + tower
                    : shapeSeed < 0.23 ? 5   // slab
                    : shapeSeed < 0.26 ? 6   // cross / plus
                    : shapeSeed < 0.29 ? 7   // twin towers
                    : shapeSeed < 0.32 ? 8   // recessed base
                    : shapeSeed < 0.35 ? 9   // cantilevered
                    : shapeSeed < 0.38 ? 10  // T-shape
                    : shapeSeed < 0.41 ? 11  // H-shape
                    : shapeSeed < 0.44 ? 12  // zigzag stack
                    : shapeSeed < 0.47 ? 13  // ziggurat
                    : shapeSeed < 0.50 ? 14  // U-shape
                    : shapeSeed < 0.53 ? 15  // inverted pyramid
                    : shapeSeed < 0.56 ? 16  // shard cluster
                    : shapeSeed < 0.59 ? 17  // crown top
                    : shapeSeed < 0.62 ? 18  // stepped terrace
                    : shapeSeed < 0.65 ? 19  // bookend
                    : shapeSeed < 0.68 ? 20  // fin tower
                    : shapeSeed < 0.71 ? 21  // split peak
                    : shapeSeed < 0.74 ? 22  // mushroom
                    : shapeSeed < 0.77 ? 23  // goal post
                    : shapeSeed < 0.80 ? 24  // layered cake
                    : shapeSeed < 0.83 ? 25  // hourglass
                    : shapeSeed < 0.86 ? 26  // obelisk
                    : shapeSeed < 0.89 ? 27  // notched tower
                    : shapeSeed < 0.92 ? 28  // battlements
                    : shapeSeed < 0.95 ? 29  // pagoda
                    : shapeSeed < 0.97 ? 30  // antenna farm
                    : shapeSeed < 0.98 ? 31  // flying saucer
                    : shapeSeed < 0.99 ? 32  // stacked rectangles
                    :                    33; // tripod base

    const b = {
      x, z, w, d, h,
      glbIdx,
      style, neonCol, winSeed,
      shapeType,
      hasSetback, sbY1, sbDX, sbDZ,
      hasSetback2, sbY2, sbDX2, sbDZ2,
      zKey: z
    };
    ch.buildings.push(b);
    i++;
  }

  // ── Inner row: continuous tiled buildings one city-block back from the road ──
  // Placed at roadEdge + ~30 u so traffic/circulation space is preserved.
  {
    const wrng     = makeRng(hash32(u32(SEED ^ u32(ch.id * 7331 + 99))));
    const standoff = WORLD.roadWidth * 0.5 + WORLD.sidewalk + 28; // ~39 u from spine

    for(let side = -1; side <= 1; side += 2){
      let zCursor = ch.z0;
      while(zCursor < ch.z1){
        const d  = wrng.range(14, 32);
        const w  = wrng.range(14, 30);
        const h  = lerp(18, 110, Math.pow(wrng.next(), 1.5));
        const z  = zCursor + d * 0.5;
        const cx = spineX(z);
        const x  = cx + side * (standoff + w * 0.5);

        if(z > ch.z0 + 4 && z < ch.z1 - 4){
          const style   = wrng.irange(0, 4);
          const huePick = wrng.irange(0, neon.length - 1);
          const winSeed = wrng.nextU32();
          const glbIdx  = wrng.next() < 0.45 ? wrng.irange(0, BUILDING_FILES.length - 1) : -1;
          ch.buildings.push({
            x, z, w, d, h,
            glbIdx,
            style, neonCol: neon[huePick], winSeed,
            shapeType: 0,
            hasSetback: false, sbY1: h, sbDX: 0, sbDZ: 0,
            hasSetback2: false, sbY2: h, sbDX2: 0, sbDZ2: 0,
            zKey: z
          });
        }
        zCursor += d;
      }
    }
  }

  // ── Outer row: no gaps, average-to-tall procedural buildings only (no reactors) ──
  {
    const orng = makeRng(hash32(u32(SEED ^ u32(ch.id * 4919 + 77))));
    for(let side = -1; side <= 1; side += 2){
      let zCursor = ch.z0;
      while(zCursor < ch.z1){
        const dStep = orng.range(22, 55);
        zCursor += dStep;
        const z = zCursor - dStep * 0.5;
        if(z <= ch.z0 + 4 || z >= ch.z1 - 4) continue;
        const w  = orng.range(14, 38);
        const d  = orng.range(14, 38);
        const cx = spineX(z);
        const dist = orng.range(170, 250);
        const x  = cx + side * (dist + w * 0.5);
        if(Math.abs(x) > WORLD.cityHalfW - 8) continue;
        const winSeed = orng.nextU32();

        // Always a building — average to tall, no reactors (glbIdx: -1)
        const h  = lerp(55, 210, Math.pow(orng.next(), 0.45));
        const sr = orng.next();
        const shapeType = sr < 0.45 ? 2 : sr < 0.60 ? 1 : sr < 0.68 ? 0
                        : sr < 0.74 ? 4 : sr < 0.80 ? 13 : sr < 0.86 ? 26
                        : sr < 0.91 ? 25 : sr < 0.95 ? 31 : 22;
        const sbRng      = makeRng(winSeed ^ 0xBEEF1234);
        const hasSetback = h > 120 && sbRng.next() < 0.55;
        const sbY1       = hasSetback ? h * sbRng.range(0.45, 0.65) : h;
        const sbDX       = hasSetback ? w * sbRng.range(0.10, 0.20) : 0;
        const sbDZ       = hasSetback ? d * sbRng.range(0.08, 0.16) : 0;
        ch.buildings.push({
          x, z, w, d, h, glbIdx: -1,
          style: orng.irange(0, 4), neonCol: neon[orng.irange(0, neon.length - 1)], winSeed,
          shapeType,
          hasSetback, sbY1, sbDX, sbDZ,
          hasSetback2: false, sbY2: h, sbDX2: 0, sbDZ2: 0,
          zKey: z,
        });
      }
    }
  }

  // Lamps
  const targetLamps = Math.max(6, Math.floor(preset.lampsPerChunk * lerp(0.75, 1.15, district)));
  for(let i=0;i<targetLamps;i++){
    const z = cr.range(ch.z0 + 6, ch.z1 - 6);
    const c = spineX(z);
    const side = (cr.next() < 0.5) ? -1 : 1;
    const x = c + side * (WORLD.roadWidth*0.5 + WORLD.sidewalk + cr.range(18, 24));
    const y = 0;
    const top = y + cr.range(4, 12);
    const col = cr.next() < 0.25 ? neon[4] : (cr.next() < 0.5 ? neon[0] : neon[2]);
    ch.lamps.push({ x, y, top, z, col, zKey: z });
  }

  // Drones
  const targetDrones = Math.max(2, Math.floor(preset.dronesPerChunk * lerp(0.7, 1.2, district)));
  for(let i=0;i<targetDrones;i++){
    const z = cr.range(ch.z0 + 10, ch.z1 - 10);
    const x = cr.range(-WORLD.cityHalfW*0.8, WORLD.cityHalfW*0.8);
    if(!roadClear(x, z, 6)) continue;
    const y = cr.range(35, 140);
    const col = cr.next() < 0.5 ? neon[0] : neon[1];
    ch.drones.push({
      x, y, z,
      col,
      wob: cr.range(0.6, 2.4),
      ph: cr.range(0, TAU),
      zKey: z
    });
  }

  ch.buildings.sort((a,b)=>a.zKey-b.zKey);
  ch.lamps.sort((a,b)=>a.zKey-b.zKey);
  ch.drones.sort((a,b)=>a.zKey-b.zKey);
  ch._sorted = true;
}

const _pendingGlbBuildings = []; // {b, ch} pairs waiting for model load

function createSidewalkMeshes(ch){
  const step     = 10;
  const zStart   = ch.z0 - 2, zEnd = ch.z1 + 2;
  const N        = Math.ceil((zEnd - zStart) / step);
  const Y        = 0.04;
  // Road border strip: road edge → just before lamp posts
  const inner1   = WORLD.roadWidth * 0.5;                         // ~11u — road edge
  const outer1   = WORLD.roadWidth * 0.5 + WORLD.sidewalk + 5;   // ~22u — road border
  // Outer sidewalk: just past lamp posts (now at 35-41u) → building base
  const inner2   = WORLD.roadWidth * 0.5 + WORLD.sidewalk + 23;  // ~40u — past outermost lamp posts
  const outer2   = WORLD.roadWidth * 0.5 + WORLD.sidewalk + 32;  // ~49u — building inner face
  // Utility boxes on the outer sidewalk only
  const boxMinOff = inner2 + 1;
  const boxMaxOff = outer2 - 1;

  function makeStrip(inner, outer){
    const pos = new Float32Array((N + 1) * 4 * 3);
    const idx = [];
    for(let i = 0; i <= N; i++){
      const z  = zStart + i * step;
      const cx = spineX(z);
      const b  = i * 12;
      pos[b+0]  = cx - inner; pos[b+1]  = Y; pos[b+2]  = z;
      pos[b+3]  = cx - outer; pos[b+4]  = Y; pos[b+5]  = z;
      pos[b+6]  = cx + inner; pos[b+7]  = Y; pos[b+8]  = z;
      pos[b+9]  = cx + outer; pos[b+10] = Y; pos[b+11] = z;
      if(i < N){
        const a = i * 4;
        idx.push(a, a+1, a+4,  a+1, a+5, a+4);       // left  — normals +Y
        idx.push(a+2, a+6, a+3,  a+3, a+6, a+7);     // right — normals +Y
      }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, _swMat);
    mesh.frustumCulled = false;
    scene.add(mesh);
    ch._meshes.push(mesh);
  }

  makeStrip(inner1, outer1);  // road border
  makeStrip(inner2, outer2);  // outer sidewalk

  // Utility / electric boxes scattered on both sidewalk strips
  const brng = makeRng(hash32(u32(SEED ^ u32(ch.id * 2719 + 55))));
  for(let side = -1; side <= 1; side += 2){
    const count = brng.irange(4, 9);
    for(let k = 0; k < count; k++){
      const bz   = brng.range(ch.z0 + 3, ch.z1 - 3);
      const cx   = spineX(bz);
      const bx   = cx + side * brng.range(boxMinOff, boxMaxOff);
      const bw   = brng.range(0.4, 1.8);
      const bd   = brng.range(0.4, 1.8);
      const bh   = brng.range(0.3, 1.4);
      const bmat = _swEquipMats[brng.irange(0, _swEquipMats.length - 1)];
      const bg = new THREE.BoxGeometry(bw, bh, bd);
      const bm = new THREE.Mesh(bg, bmat);
      bm.position.set(bx, Y + bh * 0.5, bz);
      bm.userData.ownsMaterial = false;
      bm.frustumCulled = true;
      scene.add(bm);
      ch._meshes.push(bm);
    }
  }

  // ── Sidewalk machinery — outer strip, 2-4 multi-part assemblies per side ──
  const mrng = makeRng(hash32(u32(SEED ^ u32(ch.id * 4931 + 17))));
  for(let side = -1; side <= 1; side += 2){
    const count = mrng.irange(2, 4);
    for(let k = 0; k < count; k++){
      const mz  = mrng.range(ch.z0 + 5, ch.z1 - 5);
      const cx  = spineX(mz);
      const mx  = cx + side * mrng.range(inner2 + 1, outer2 - 2);
      const mmat = _swEquipMats[mrng.irange(0, _swEquipMats.length - 1)];

      function addPart(ox, oz, pw, ph, pd, isTop){
        const g = new THREE.BoxGeometry(pw, ph, pd);
        const m = new THREE.Mesh(g, mmat);
        m.position.set(mx + ox, Y + ph * 0.5 + (isTop ? ph * 0.5 + mrng.range(0.4, 1.2) : 0), mz + oz);
        m.userData.ownsMaterial = false;
        m.frustumCulled = true;
        scene.add(m); ch._meshes.push(m);
        return ph;
      }

      // Base unit
      const bw = mrng.range(2.5, 6.0), bd = mrng.range(2.0, 5.0), bh = mrng.range(1.2, 3.5);
      addPart(0, 0, bw, bh, bd, false);

      // Secondary block on top or beside
      const hasTop = mrng.next() < 0.65;
      if(hasTop){
        const tw = mrng.range(0.8, bw * 0.7), td = mrng.range(0.8, bd * 0.7), th = mrng.range(0.6, 2.0);
        const tox = mrng.range(-bw * 0.2, bw * 0.2), toz = mrng.range(-bd * 0.2, bd * 0.2);
        const g2 = new THREE.BoxGeometry(tw, th, td);
        const m2 = new THREE.Mesh(g2, mmat);
        m2.position.set(mx + tox, Y + bh + th * 0.5, mz + toz);
        m2.userData.ownsMaterial = false;
        m2.frustumCulled = true;
        scene.add(m2); ch._meshes.push(m2);
      }

      // Cylindrical tank / pipe (~40% chance)
      if(mrng.next() < 0.40){
        const cr_ = mrng.range(0.3, 0.9), ch_ = mrng.range(1.5, 4.0);
        const isVertical = mrng.next() < 0.6;
        const cg = new THREE.CylinderGeometry(cr_, cr_, ch_, 8);
        const cm = new THREE.Mesh(cg, mmat);
        const cox = mrng.range(-bw * 0.4, bw * 0.4) + (side > 0 ? bw * 0.5 + cr_ : -bw * 0.5 - cr_);
        if(isVertical){
          cm.position.set(mx + cox, Y + ch_ * 0.5, mz);
        } else {
          cm.rotation.z = Math.PI * 0.5;
          cm.position.set(mx + cox, Y + cr_ + 0.3, mz);
        }
        cm.userData.ownsMaterial = false;
        cm.frustumCulled = true;
        scene.add(cm); ch._meshes.push(cm);
      }
    }
  }
}

function createGroundDecals(ch){
  const rng  = makeRng(hash32(u32(SEED ^ u32(ch.id * 8191 + 43))));
  const dummy = new THREE.Object3D();

  // ── Flat ground panels — merged into ONE draw call per chunk ─────────────
  // All 80 quads baked into a single BufferGeometry with vertex colours.
  const PANELS = 40;
  const pPos = [], pCol = [], pIdx = [];
  let pv = 0;
  for(let side = -1; side <= 1; side += 2){
    for(let i = 0; i < PANELS; i++){
      const z  = rng.range(ch.z0 + 1, ch.z1 - 1);
      const cx = spineX(z);
      const x  = cx + side * rng.range(42, 252);
      if(Math.abs(x) > WORLD.cityHalfW - 4) continue;
      const pw = rng.range(4, 20);
      const pd = rng.range(3, 15);
      const [r,g,b] = _panelColors[rng.irange(0, _panelColors.length - 1)];
      const x0 = x - pw*0.5, x1 = x + pw*0.5;
      const z0 = z - pd*0.5, z1 = z + pd*0.5;
      pPos.push(x0,0.05,z0, x1,0.05,z0, x1,0.05,z1, x0,0.05,z1);
      pCol.push(r,g,b, r,g,b, r,g,b, r,g,b);
      pIdx.push(pv,pv+1,pv+2, pv,pv+2,pv+3);
      pv += 4;
    }
  }
  if(pv > 0){
    const pg = new THREE.BufferGeometry();
    pg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pPos), 3));
    pg.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(pCol), 3));
    pg.setIndex(pIdx);
    const pm = new THREE.Mesh(pg, _panelMergeMat);
    pm.frustumCulled = true;
    scene.add(pm);
    ch._meshes.push(pm);
  }

  // ── Small industrial cubes (InstancedMesh) ────────────────────────────────
  // Dense scattering of tiny boxes (0.3–2.2 u tall) — gives the ground the
  // visual complexity of a circuit board or industrial yard when viewed from above.
  const BOX_COUNT = 45;
  const boxGeo  = new THREE.BoxGeometry(1, 1, 1);
  // White base + per-instance color = same 5-step palette as buildings, one draw call
  const boxMat  = new THREE.MeshBasicMaterial({ color: 0xffffff, fog: true });
  const boxInst = new THREE.InstancedMesh(boxGeo, boxMat, BOX_COUNT * 2);
  boxInst.frustumCulled = false;
  boxInst.castShadow = false;
  boxInst.receiveShadow = false;
  // _cubeColors defined once at module level (below _panelMats)
  let boxIdx = 0;
  for(let side = -1; side <= 1; side += 2){
    for(let i = 0; i < BOX_COUNT; i++){
      const z    = rng.range(ch.z0 + 1, ch.z1 - 1);
      const cx   = spineX(z);
      const dist = rng.range(42, 252);
      const x    = cx + side * dist;
      if(Math.abs(x) > WORLD.cityHalfW - 3) continue;
      const bh = rng.range(0.08, 0.55);               // very flat plate
      // X-width capped so near-road plates never stretch into the inner row (~40u)
      const maxBW = Math.max(2, 2 * (dist - 40));
      const bw = rng.range(6, Math.min(55, maxBW));   // road-axis width, capped near road
      const bd = rng.range(8, 60);                    // Z-axis (along road) unconstrained
      dummy.position.set(x, bh * 0.5, z);
      dummy.scale.set(bw, bh, bd);
      dummy.rotation.set(0, 0, 0);
      dummy.updateMatrix();
      boxInst.setMatrixAt(boxIdx, dummy.matrix);
      boxInst.setColorAt(boxIdx, _cubeColors[rng.irange(0, _cubeColors.length - 1)]);
      boxIdx++;
    }
  }
  boxInst.count = boxIdx;
  boxInst.instanceMatrix.needsUpdate = true;
  if(boxInst.instanceColor) boxInst.instanceColor.needsUpdate = true;
  scene.add(boxInst);
  ch._meshes.push(boxInst);

}

function createChunkMeshes(ch){
  ch._meshes = [];
  createSidewalkMeshes(ch);
  createGroundDecals(ch);

  // Per-chunk geometry collector for batched building + lamp meshes
  const _bC = {
    bPos:[], bCol:[], bIdx:[], bv:0,   // body boxes (buildings only — lamp poles are separate)
    lPos:[], lCol:[],                   // neon cap lines
    wPos:[], wCol:[], wIdx:[], wv:0,    // windows
    hPos:[], hCol:[], hIdx:[], hv:0,   // lamp heads (neon vertex colour)
    plPos:[], plIdx:[], plv:0,         // lamp poles (vertex positions only, no vertex colour)
  };

  for(const b of ch.buildings){
    if(b.glbIdx >= 0){
      placeBuildingGlb(b, ch);
    } else {
      createBuildingMeshes(b, ch, _bC);
    }
  }

  for(const lm of ch.lamps) createLampMesh(lm, ch, _bC);

  // Flush body geometry → 1 mesh
  if(_bC.bv > 0){
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(_bC.bPos), 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(_bC.bCol), 3));
    geo.setIndex(_bC.bIdx);
    geo.computeVertexNormals();
    const m = new THREE.Mesh(geo, _bldMergeMat);
    m.frustumCulled = true;
    scene.add(m); ch._meshes.push(m);
  }

  // Flush cap lines → 1 LineSegments
  if(_bC.lPos.length > 0){
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(_bC.lPos), 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(_bC.lCol), 3));
    const m = new THREE.LineSegments(geo, _capMergeMat);
    m.frustumCulled = true;
    scene.add(m); ch._meshes.push(m);
  }

  // Flush windows → 1 mesh
  if(_bC.wv > 0){
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(_bC.wPos), 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(_bC.wCol), 3));
    geo.setIndex(_bC.wIdx);
    const m = new THREE.Mesh(geo, _winMat);
    m.frustumCulled = true;
    scene.add(m); ch._meshes.push(m);
  }

  // Flush lamp poles → 1 mesh per chunk (separate from building body, shared dark material)
  if(_bC.plv > 0){
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(_bC.plPos), 3));
    geo.setIndex(_bC.plIdx);
    geo.computeVertexNormals();
    const m = new THREE.Mesh(geo, _lampPoleMat);
    m.frustumCulled = true;
    scene.add(m); ch._meshes.push(m);
  }

  // Flush lamp heads → 1 mesh per chunk
  if(_bC.hv > 0){
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(_bC.hPos), 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(_bC.hCol), 3));
    geo.setIndex(_bC.hIdx);
    const m = new THREE.Mesh(geo, _lampHeadMat);
    m.frustumCulled = true;
    scene.add(m); ch._meshes.push(m);
  }

  for(const dr of ch.drones){
    createDroneMesh(dr, ch);
  }

  // Freeze local→world matrix on every static chunk mesh.
  // Three.js recomputes this for ALL scene objects every frame by default;
  // static geometry never moves so this is pure waste.
  for(const m of ch._meshes){
    m.updateMatrix();
    m.matrixAutoUpdate = false;
  }
}

/* =========================
   Procedural window generation
========================= */
function buildTierWindows(b, ch, tierX, tierY0, tierY1, tierW, tierD, wCol){
  const tierH = tierY1 - tierY0;
  if(tierH < 5) return;

  // Style derived from winSeed — same across all tiers of one building
  const styleRoll = fhash01(hash32(u32(b.winSeed ^ 0xC0DE1234)));
  if(styleRoll > 0.90) return; // ~10% buildings windowless

  // Window dimensions per style
  let winW, winH, floorH, hGap, fullWidth = false;
  if     (styleRoll < 0.40){ winW=0.9; winH=1.2; floorH=3.5; hGap=1.0; }               // grid
  else if(styleRoll < 0.62){ winW=0.8; winH=4.5; floorH=6.5; hGap=2.5; }               // slit
  else if(styleRoll < 0.78){ winW=0;   winH=1.0; floorH=4.5; hGap=0;   fullWidth=true;} // band
  else                      { winW=2.2; winH=2.2; floorH=5.5; hGap=2.0; }               // panel

  const litPct = 0.30 + fhash01(hash32(u32(b.winSeed ^ 0xFF1100))) * 0.45;

  // Per-building colour tint + overall brightness
  const tint       = WIN_TINTS[u32(b.winSeed ^ 0xF1E2D3C4) % 6];
  const baseBright = 0.18 + fhash01(hash32(u32(b.winSeed ^ 0x3C8A1F72))) * 0.72;

  // Per-tier RNG — different tiers have different lit patterns
  const litRng = makeRng(u32(b.winSeed ^ u32((tierY0 * 31) | 0)));

  const posArr = [];
  const idxArr = [];
  const colArr = [];   // 3 floats per vertex — RGB vertex colour

  // Current window colour, written before each face.place() call
  let _wr = 0, _wg = 0, _wb = 0;

  function addWinQuad(x0,y0,z0, x1,y1,z1, x2,y2,z2, x3,y3,z3){
    const base = posArr.length / 3;
    posArr.push(x0,y0,z0, x1,y1,z1, x2,y2,z2, x3,y3,z3);
    idxArr.push(base,base+1,base+2, base,base+2,base+3);
    // 4 vertices × RGB — same colour for all corners of this window
    colArr.push(_wr,_wg,_wb, _wr,_wg,_wb, _wr,_wg,_wb, _wr,_wg,_wb);
  }

  const EPS = 0.06; // push quads just proud of the facade

  // 4 faces: front/back normals ±Z, left/right normals ±X
  // fu0→fu1 is the face-local horizontal extent, wy0→wy1 is the world Y extent
  // Two faces are never visible while driving forward along +Z:
  //   • Outer face (away from road): index 3 for right buildings, index 2 for left
  //   • Forward face (+Z, facing the spawn direction): index 1 — always behind the player
  const skipOuter = tierX > 0 ? 3 : (tierX < 0 ? 2 : -1);
  const faces = [
    { fw: tierW, place(fu0,fu1,wy0,wy1){
        const wz = b.z - tierD*0.5 - EPS;
        addWinQuad(tierX+fu0,wy0,wz, tierX+fu1,wy0,wz, tierX+fu1,wy1,wz, tierX+fu0,wy1,wz);
    }},
    { fw: tierW, place(fu0,fu1,wy0,wy1){
        const wz = b.z + tierD*0.5 + EPS;
        addWinQuad(tierX+fu0,wy0,wz, tierX+fu1,wy0,wz, tierX+fu1,wy1,wz, tierX+fu0,wy1,wz);
    }},
    { fw: tierD, place(fu0,fu1,wy0,wy1){
        const wx = tierX - tierW*0.5 - EPS;
        addWinQuad(wx,wy0,b.z+fu0, wx,wy0,b.z+fu1, wx,wy1,b.z+fu1, wx,wy1,b.z+fu0);
    }},
    { fw: tierD, place(fu0,fu1,wy0,wy1){
        const wx = tierX + tierW*0.5 + EPS;
        addWinQuad(wx,wy0,b.z+fu0, wx,wy0,b.z+fu1, wx,wy1,b.z+fu1, wx,wy1,b.z+fu0);
    }},
  ];

  for(let fi = 0; fi < faces.length; fi++){
    if(fi === 1 || fi === skipOuter) continue; // skip forward (+Z) face and outer face
    const face = faces[fi];
    const fW      = face.fw;
    const effWinW = fullWidth ? fW - 2.0 : winW;
    if(effWinW <= 0) continue;

    const hStep  = effWinW + hGap;
    const nCols  = fullWidth ? 1 : Math.max(0, Math.floor((fW - hGap) / hStep));
    if(nCols === 0) continue;
    const hStart = (fW - nCols * hStep + hGap) * 0.5; // centre windows on face

    const nRows = Math.max(0, Math.floor((tierH - 1.0) / floorH));
    if(nRows === 0) continue;
    const vPad  = (tierH - nRows * floorH + (floorH - winH)) * 0.5;

    for(let row = 0; row < nRows; row++){
      const wy0 = tierY0 + vPad + row * floorH;
      const wy1 = wy0 + winH;
      if(wy1 > tierY1 - 0.5) continue;

      for(let col = 0; col < nCols; col++){
        if(litRng.next() > litPct) continue; // dark window — skip

        // Per-window brightness: 55–100% of building base, then tinted
        const wb = baseBright * (0.55 + litRng.next() * 0.45);
        _wr = tint[0] * wb;  _wg = tint[1] * wb;  _wb = tint[2] * wb;

        const fu0 = -fW*0.5 + hStart + col * hStep;
        face.place(fu0, fu0 + effWinW, wy0, wy1);
      }
    }
  }

  if(posArr.length === 0) return;

  if(wCol){
    // Batch mode: add to chunk window collector, offset indices by current vertex count
    const base = wCol.wv;
    for(const v of posArr) wCol.wPos.push(v);
    for(const c of colArr) wCol.wCol.push(c);
    for(const idx of idxArr) wCol.wIdx.push(base/3 + idx);
    wCol.wv += posArr.length;
    return;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(posArr), 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(colArr), 3));
  geo.setIndex(idxArr);
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, _winMat);
  mesh.frustumCulled = true;
  scene.add(mesh);
  ch._meshes.push(mesh);
}

function createBuildingMeshes(b, ch, _bC){
  const mat = getBuildingMaterial(b.style, b.neonCol);

  // Neon color scaled ×5 for bloom (matching LineBasicMaterial behaviour)
  const nc = b.neonCol;
  const nr = nc[0]/255*5, ng = nc[1]/255*5, nb = nc[2]/255*5;
  // Body color from palette
  const [br, bg, bb] = _bldBodyRGB[b.style % _bldBodyRGB.length];

  function addTier(x, y0, y1, w, d){
    const hh = y1 - y0;
    if(hh <= 0 || w <= 0 || d <= 0) return;
    const isTopTier = (y1 === b.h);
    const cy = y0 + hh*0.5;
    const isCylinder = b.shapeType === 1 || b.shapeType === 2;

    if(isCylinder){
      // Keep individual meshes for cylinders, use Lambert
      const r = Math.max(w, d) * 0.5;
      const segments = b.shapeType === 1 ? 8 : 14;
      const geo = new THREE.CylinderGeometry(r, r, hh, segments);
      const mesh = new THREE.Mesh(geo, _bldCylMat);
      mesh.position.set(x, cy, b.z);
      mesh.frustumCulled = true;
      scene.add(mesh); ch._meshes.push(mesh);
      const capGeo = b.shapeType === 1 ? makeFramePolygon(r+0.3, 8) : makeFramePolygon(r+0.3, 14);
      const cap = new THREE.LineSegments(capGeo, getFrameMaterial(b.neonCol));
      cap.position.set(x, y1, b.z);
      cap.frustumCulled = true;
      scene.add(cap); ch._meshes.push(cap);
      return;
    }

    // Box-type: batch everything
    _batchBox(_bC, x, cy, b.z, w, hh, d, br, bg, bb);

    // Base plate
    if(y0 === 0 && b.glbIdx < 0){
      _batchBox(_bC, x, 0.05, b.z, w+1.2, 0.10, d+1.2, br, bg, bb);
    }

    // Neon rect cap
    _batchCapRect(_bC, x, y1, b.z, w, d, nr, ng, nb);

    // Windows
    buildTierWindows(b, ch, x, y0, y1, w, d, _bC);

    // ── LOW-COST DECORATIONS (box shapes only) ────────────────────────────────

    // Corner pillars — 4 thin vertical pylons at the tier corners (~50% of box buildings)
    if((b.shapeType < 3 || b.shapeType === 5 || b.shapeType >= 8) && fhash01(hash32(u32(b.winSeed ^ 0xCC11AA22))) < 0.50){
      const pW = 0.9;
      const corners = [[-w*.5,-d*.5],[w*.5,-d*.5],[w*.5,d*.5],[-w*.5,d*.5]];
      for(const [ox,oz] of corners){
        _batchBox(_bC, x+ox, cy, b.z+oz, pW, hh+1.5, pW, br, bg, bb);
      }
    }

    // Facade ribs — horizontal bands extruding slightly beyond each face (~40%)
    if((b.shapeType < 3 || b.shapeType === 5 || b.shapeType >= 8) && hh > 14 && fhash01(hash32(u32(b.winSeed ^ 0xABCD1234))) < 0.40){
      const spacing = 9 + fhash01(hash32(u32(b.winSeed ^ 0x5678CDEF))) * 7;
      const ribH = 0.45, ribEx = 0.6;
      for(let ry = y0+spacing; ry < y1-2; ry += spacing){
        _batchBox(_bC, x, ry, b.z, w+ribEx*2, ribH, d+ribEx*2, br, bg, bb);
      }
    }

    // Rooftop machinery — 2–3 small boxes on the roof of the top tier (~55%)
    if(isTopTier && (b.shapeType < 3 || b.shapeType === 5 || b.shapeType >= 8) && fhash01(hash32(u32(b.winSeed ^ 0x99887766))) < 0.55){
      const nBoxes = fhash01(hash32(u32(b.winSeed ^ 0xF0E1D2C3))) < 0.4 ? 3 : 2;
      for(let k=0; k<nBoxes; k++){
        const h1=fhash01(hash32(u32(b.winSeed^u32(0x11223300+k))));
        const h2=fhash01(hash32(u32(b.winSeed^u32(0x44556600+k))));
        const h3=fhash01(hash32(u32(b.winSeed^u32(0x77889900+k))));
        const h4=fhash01(hash32(u32(b.winSeed^u32(0xAABBCC00+k))));
        const mw=2.5+h1*4.5, md_=2.5+h2*4.5, mh=2.5+h3*7.5;
        const mx=x+(h4-0.5)*w*0.65;
        const mz=b.z+(fhash01(hash32(u32(b.winSeed^u32(0xDDEEFF00+k))))-0.5)*d*0.65;
        _batchBox(_bC, mx, y1+mh*.5, mz, mw, mh, md_, br, bg, bb);
      }
    }
  }

  const mainY1 = b.hasSetback ? b.sbY1 : b.h;

  if(b.shapeType === 3){
    // ── L-shape: main bar (full w, reduced d) + side wing (partial w, full d) ──
    addTier(b.x, 0, mainY1, b.w, b.d * 0.55);
    const wingX = b.x + (b.w - b.w * 0.38) * 0.5;
    addTier(wingX, 0, mainY1 * 0.70, b.w * 0.38, b.d);
    if(b.hasSetback){
      addTier(b.x, b.sbY1, b.hasSetback2 ? b.sbY2 : b.h, b.w - b.sbDX, (b.d * 0.55) - b.sbDZ);
    }
    if(b.hasSetback2){
      addTier(b.x, b.sbY2, b.h, b.w - b.sbDX2, (b.d * 0.55) - b.sbDZ2);
    }
  } else if(b.shapeType === 4){
    // ── Podium + tower: wide squat base then narrower tower ──
    const podiumH = b.h * 0.18;
    addTier(b.x, 0, podiumH, b.w * 1.30, b.d * 1.30);
    addTier(b.x, podiumH, b.hasSetback ? b.sbY1 : b.h, b.w, b.d);
    if(b.hasSetback){
      addTier(b.x, b.sbY1, b.hasSetback2 ? b.sbY2 : b.h, b.w - b.sbDX, b.d - b.sbDZ);
    }
    if(b.hasSetback2){
      addTier(b.x, b.sbY2, b.h, b.w - b.sbDX2, b.d - b.sbDZ2);
    }
  } else if(b.shapeType === 5){
    // ── Slab: super-wide, very thin — wall-like silhouette ──
    addTier(b.x, 0, b.h, b.w * 2.2, b.d * 0.30);

  } else if(b.shapeType === 6){
    // ── Cross / plus: two perpendicular bars overlapping at centre ──
    addTier(b.x, 0, b.h,        b.w,        b.d * 0.42);  // main bar
    addTier(b.x, 0, b.h * 0.75, b.w * 0.42, b.d);         // cross arm, shorter

  } else if(b.shapeType === 7){
    // ── Twin towers: shared squat base + two narrow towers side by side ──
    const baseH  = b.h * 0.14;
    const towerW = b.w * 0.42;
    const tGap   = b.w * 0.08;
    addTier(b.x,                        0,     baseH, b.w,    b.d);
    addTier(b.x - towerW * 0.5 - tGap, baseH, b.h,   towerW, b.d * 0.85);
    addTier(b.x + towerW * 0.5 + tGap, baseH, b.h,   towerW, b.d * 0.85);

  } else if(b.shapeType === 8){
    // ── Recessed base: narrow stilted ground floor, full-width upper body ──
    const stiltsH = b.h * 0.16;
    addTier(b.x, 0,        stiltsH, b.w * 0.55, b.d * 0.55);
    addTier(b.x, stiltsH,  b.hasSetback ? b.sbY1 : b.h, b.w, b.d);
    if(b.hasSetback){
      addTier(b.x, b.sbY1, b.hasSetback2 ? b.sbY2 : b.h, b.w - b.sbDX, b.d - b.sbDZ);
    }
    if(b.hasSetback2){
      addTier(b.x, b.sbY2, b.h, b.w - b.sbDX2, b.d - b.sbDZ2);
    }

  } else if(b.shapeType === 9){
    // ── Cantilevered: lower half centred, upper half shifted in X ──
    const splitH = b.h * 0.45;
    const shift  = b.w * 0.22;
    addTier(b.x,         0,      splitH, b.w,        b.d);
    addTier(b.x + shift, splitH, b.h,    b.w * 0.90, b.d * 0.90);

  } else if(b.shapeType === 10){
    // ── T-shape: full-height stem + wide cap bar ──
    addTier(b.x, 0, b.h,        b.w * 0.40, b.d);
    addTier(b.x, 0, b.h * 0.60, b.w,        b.d * 0.38);

  } else if(b.shapeType === 11){
    // ── H-shape: two parallel towers + mid-height bridge ──
    addTier(b.x - b.w * 0.32, 0, b.h,        b.w * 0.34, b.d);
    addTier(b.x + b.w * 0.32, 0, b.h,        b.w * 0.34, b.d);
    addTier(b.x, b.h * 0.38,  b.h * 0.58,    b.w * 0.64, b.d * 0.32);

  } else if(b.shapeType === 12){
    // ── Zigzag stack: three tiers each shifted in X ──
    const zShift = b.w * 0.18;
    addTier(b.x - zShift, 0,          b.h * 0.34, b.w,        b.d);
    addTier(b.x,          b.h * 0.34, b.h * 0.67, b.w * 0.85, b.d * 0.85);
    addTier(b.x + zShift, b.h * 0.67, b.h,        b.w * 0.70, b.d * 0.70);

  } else if(b.shapeType === 13){
    // ── Ziggurat: three symmetric equal-step setbacks ──
    addTier(b.x, 0,          b.h * 0.38, b.w,        b.d);
    addTier(b.x, b.h * 0.38, b.h * 0.68, b.w * 0.68, b.d * 0.68);
    addTier(b.x, b.h * 0.68, b.h,        b.w * 0.42, b.d * 0.42);

  } else if(b.shapeType === 14){
    // ── U-shape: two tall side wings + low connecting back wall ──
    addTier(b.x - b.w * 0.36, 0, b.h,        b.w * 0.26, b.d);
    addTier(b.x + b.w * 0.36, 0, b.h,        b.w * 0.26, b.d);
    addTier(b.x,               0, b.h * 0.28, b.w * 0.72, b.d * 0.38);

  } else if(b.shapeType === 15){
    // ── Inverted pyramid: narrow base, progressively wider going up ──
    addTier(b.x, 0,          b.h * 0.32, b.w * 0.46, b.d * 0.46);
    addTier(b.x, b.h * 0.32, b.h * 0.65, b.w * 0.73, b.d * 0.73);
    addTier(b.x, b.h * 0.65, b.h,        b.w,        b.d);

  } else if(b.shapeType === 16){
    // ── Shard cluster: three thin towers, different heights ──
    addTier(b.x,              0, b.h,        b.w * 0.30, b.d * 0.30);
    addTier(b.x - b.w * 0.32, 0, b.h * 0.72, b.w * 0.22, b.d * 0.22);
    addTier(b.x + b.w * 0.28, 0, b.h * 0.52, b.w * 0.20, b.d * 0.20);

  } else if(b.shapeType === 17){
    // ── Crown top: tower with wider overhanging crown at the top ──
    addTier(b.x, 0,          b.h * 0.82, b.w,        b.d);
    addTier(b.x, b.h * 0.82, b.h,        b.w * 1.28, b.d * 1.28);

  } else if(b.shapeType === 18){
    // ── Stepped terrace: four tiers shifting in X — diagonal staircase profile ──
    const tShift = b.w * 0.14;
    addTier(b.x - tShift * 1.5, 0,          b.h * 0.25, b.w,        b.d);
    addTier(b.x - tShift * 0.5, b.h * 0.25, b.h * 0.50, b.w * 0.80, b.d * 0.85);
    addTier(b.x + tShift * 0.5, b.h * 0.50, b.h * 0.75, b.w * 0.62, b.d * 0.70);
    addTier(b.x + tShift * 1.5, b.h * 0.75, b.h,        b.w * 0.46, b.d * 0.55);

  } else if(b.shapeType === 19){
    // ── Bookend: two tall thin end-slabs + low connecting bar ──
    addTier(b.x - b.w * 0.38, 0, b.h,        b.w * 0.22, b.d * 0.75);
    addTier(b.x + b.w * 0.38, 0, b.h,        b.w * 0.22, b.d * 0.75);
    addTier(b.x,               0, b.h * 0.20, b.w,        b.d * 0.40);

  } else if(b.shapeType === 20){
    // ── Fin tower: normal base + ultra-wide thin vertical fin ──
    addTier(b.x, 0,          b.h * 0.22, b.w,       b.d);
    addTier(b.x, b.h * 0.22, b.h,        b.w * 2.0, b.d * 0.14);

  } else if(b.shapeType === 21){
    // ── Split peak: wide base diverging into two peaks ──
    const peakW = b.w * 0.44;
    addTier(b.x,              0,          b.h * 0.38, b.w,   b.d);
    addTier(b.x - b.w * 0.28, b.h * 0.38, b.h,       peakW, b.d * 0.75);
    addTier(b.x + b.w * 0.28, b.h * 0.38, b.h,       peakW, b.d * 0.75);

  } else if(b.shapeType === 22){
    // ── Mushroom: thin stem + enormous wide flat cap ──
    addTier(b.x, 0,          b.h * 0.85, b.w * 0.35, b.d * 0.35);  // stem
    addTier(b.x, b.h * 0.85, b.h,        b.w * 1.80, b.d * 1.80);  // cap

  } else if(b.shapeType === 23){
    // ── Goal post: two towers + ultra-thin top bar ──
    addTier(b.x - b.w * 0.38, 0,          b.h,        b.w * 0.22, b.d);
    addTier(b.x + b.w * 0.38, 0,          b.h,        b.w * 0.22, b.d);
    addTier(b.x,               b.h * 0.88, b.h,        b.w * 0.78, b.d * 0.28);  // top bar

  } else if(b.shapeType === 24){
    // ── Layered cake: 5 equal-height tiers each smaller ──
    addTier(b.x, 0,          b.h * 0.20, b.w,        b.d);
    addTier(b.x, b.h * 0.20, b.h * 0.40, b.w * 0.82, b.d * 0.82);
    addTier(b.x, b.h * 0.40, b.h * 0.60, b.w * 0.64, b.d * 0.64);
    addTier(b.x, b.h * 0.60, b.h * 0.80, b.w * 0.46, b.d * 0.46);
    addTier(b.x, b.h * 0.80, b.h,        b.w * 0.28, b.d * 0.28);

  } else if(b.shapeType === 25){
    // ── Hourglass: wide base, narrow waist, wide crown ──
    addTier(b.x, 0,          b.h * 0.32, b.w,        b.d);           // wide base
    addTier(b.x, b.h * 0.32, b.h * 0.68, b.w * 0.42, b.d * 0.42);  // narrow waist
    addTier(b.x, b.h * 0.68, b.h,        b.w * 0.88, b.d * 0.88);  // wide crown

  } else if(b.shapeType === 26){
    // ── Obelisk: wide base, mid needle, top spike ──
    addTier(b.x, 0,          b.h * 0.30, b.w,        b.d);
    addTier(b.x, b.h * 0.30, b.h * 0.75, b.w * 0.28, b.d * 0.28);
    addTier(b.x, b.h * 0.75, b.h,        b.w * 0.10, b.d * 0.10);

  } else if(b.shapeType === 27){
    // ── Notched tower: full-width top/bottom, narrow waist ──
    addTier(b.x, 0,          b.h * 0.40, b.w,        b.d);
    addTier(b.x, b.h * 0.40, b.h * 0.62, b.w * 0.52, b.d * 0.52);  // notch
    addTier(b.x, b.h * 0.62, b.h,        b.w,        b.d);

  } else if(b.shapeType === 28){
    // ── Battlements: main tower + 3 crenellation blocks ──
    addTier(b.x,               0,          b.h * 0.88, b.w,        b.d);
    addTier(b.x - b.w * 0.30,  b.h * 0.88, b.h,        b.w * 0.24, b.d * 0.80);
    addTier(b.x,                b.h * 0.88, b.h,        b.w * 0.24, b.d * 0.80);
    addTier(b.x + b.w * 0.30,  b.h * 0.88, b.h,        b.w * 0.24, b.d * 0.80);

  } else if(b.shapeType === 29){
    // ── Pagoda: 3 body tiers with eave slabs ──
    addTier(b.x, 0,          b.h * 0.04, b.w * 1.20, b.d * 1.20);  // ground eave
    addTier(b.x, b.h * 0.04, b.h * 0.36, b.w,        b.d);          // body 1
    addTier(b.x, b.h * 0.36, b.h * 0.40, b.w * 0.92, b.d * 0.92);  // mid eave
    addTier(b.x, b.h * 0.40, b.h * 0.72, b.w * 0.72, b.d * 0.72);  // body 2
    addTier(b.x, b.h * 0.72, b.h * 0.76, b.w * 0.66, b.d * 0.66);  // top eave
    addTier(b.x, b.h * 0.76, b.h,        b.w * 0.44, b.d * 0.44);  // body 3

  } else if(b.shapeType === 30){
    // ── Antenna farm: flat base + 3 thin spires ──
    addTier(b.x,               0,          b.h * 0.14, b.w * 1.10, b.d * 0.70);           // flat base
    addTier(b.x,               b.h * 0.14, b.h,        b.w * 0.08, b.d * 0.08);           // centre spire
    addTier(b.x - b.w * 0.35,  b.h * 0.14, b.h * 0.72, b.w * 0.07, b.d * 0.07);          // left spire
    addTier(b.x + b.w * 0.35,  b.h * 0.14, b.h * 0.55, b.w * 0.07, b.d * 0.07);          // right spire

  } else if(b.shapeType === 31){
    // ── Flying saucer: thin stem + wide disc + tiny crown ──
    addTier(b.x, 0,          b.h * 0.78, b.w * 0.28, b.d * 0.28);  // stem
    addTier(b.x, b.h * 0.78, b.h * 0.88, b.w * 1.60, b.d * 1.60);  // disc
    addTier(b.x, b.h * 0.88, b.h,        b.w * 0.20, b.d * 0.20);  // crown

  } else if(b.shapeType === 32){
    // ── Stacked rectangles: 4 alternating wide-thin / narrow-deep ──
    addTier(b.x, 0,          b.h * 0.25, b.w * 1.40, b.d * 0.50);  // wide thin
    addTier(b.x, b.h * 0.25, b.h * 0.50, b.w * 0.50, b.d * 1.10);  // narrow deep
    addTier(b.x, b.h * 0.50, b.h * 0.75, b.w * 1.10, b.d * 0.42);  // wide thin
    addTier(b.x, b.h * 0.75, b.h,        b.w * 0.38, b.d * 0.90);  // narrow deep

  } else if(b.shapeType === 33){
    // ── Tripod base: 3 separate legs + unified body above ──
    addTier(b.x - b.w * 0.36, 0,          b.h * 0.45, b.w * 0.22, b.d * 0.60);  // left leg
    addTier(b.x + b.w * 0.36, 0,          b.h * 0.45, b.w * 0.22, b.d * 0.60);  // right leg
    addTier(b.x,               0,          b.h * 0.45, b.w * 0.22, b.d * 0.60);  // centre leg
    addTier(b.x,               b.h * 0.45, b.h,        b.w,        b.d);          // unified body above

  } else if(b.shapeType === 34){
    // ── Utility shed: flat 1-floor body + rooftop machinery cluster ──
    addTier(b.x, 0, b.h, b.w, b.d);
    const mrng  = makeRng(b.winSeed ^ 0xF00DCAFE);
    const count = mrng.irange(3, 7);
    for(let m = 0; m < count; m++){
      const mw = mrng.range(1.2, Math.min(4.5, b.w * 0.48));
      const md = mrng.range(1.2, Math.min(4.5, b.d * 0.48));
      const mh = mrng.range(1.5, 5.5);
      const mx = b.x + mrng.range(-b.w * 0.38, b.w * 0.38);
      _batchBox(_bC, mx, b.h + mh * 0.5, b.z, mw, mh, md, br, bg, bb);
      _batchCapRect(_bC, mx, b.h + mh, b.z, mw, md, nr, ng, nb);
    }

  } else {
    // ── Standard: box, octagonal, or cylindrical ──
    addTier(b.x, 0, mainY1, b.w, b.d);
    if(b.hasSetback){
      addTier(b.x, b.sbY1, b.hasSetback2 ? b.sbY2 : b.h, b.w - b.sbDX, b.d - b.sbDZ);
    }
    if(b.hasSetback2){
      addTier(b.x, b.sbY2, b.h, b.w - b.sbDX2, b.d - b.sbDZ2);
    }
  }

  // Tapered spire — thin cone rising above the building (~30% of non-GLB box/octagons)
  if(b.glbIdx < 0 && (b.shapeType < 3 || b.shapeType === 5 || b.shapeType >= 8) && fhash01(hash32(u32(b.winSeed ^ 0x7F8E9D0C))) < 0.30){
    const spireH = 8 + fhash01(hash32(u32(b.winSeed ^ 0x1B2C3D4E))) * 22;
    const spireGeo = new THREE.CylinderGeometry(0, 0.45, spireH, 5);
    const spMesh = new THREE.Mesh(spireGeo, _bldCylMat);
    spMesh.position.set(b.x, b.h + spireH * 0.5, b.z);
    spMesh.frustumCulled = true;
    scene.add(spMesh); ch._meshes.push(spMesh);
  }

  // Antenna blink light — tall buildings only, ~40 % chance
  if(b.h > 72 && fhash01(hash32(u32(b.winSeed ^ 0xAE110FF5))) < 0.40){
    const lightGeo = new THREE.SphereGeometry(0.55, 5, 4);
    const lightMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(0, 0, 0),
      emissive: new THREE.Color(1.0, 0.04, 0.02),
      emissiveIntensity: 0,
      roughness: 1, metalness: 0
    });
    const lightMesh = new THREE.Mesh(lightGeo, lightMat);
    lightMesh.position.set(b.x, b.h + 0.8, b.z);
    lightMesh.frustumCulled = true;
    // Stagger blink phase so lights don't all pulse together
    lightMesh.userData.blinkPhase = fhash01(hash32(u32(b.winSeed ^ 0x55AA33CC)));
    scene.add(lightMesh);
    ch._meshes.push(lightMesh);
    _antennaLights.add(lightMesh);
  }
}

function placeBuildingGlb(b, ch){
  const mdl = _3bModels[b.glbIdx];
  if(!mdl){
    _pendingGlbBuildings.push({b, ch});
    return;
  }
  const clone = mdl.clone();

  const origSz = mdl.userData.origSz;

  // XZ: uniform scale preserving the model's natural proportions,
  // fitted so its largest horizontal dimension matches the building footprint.
  const scXZ = Math.max(b.w, b.d) / Math.max(origSz.x, origSz.z, 0.01);

  // Y: independent vertical stretch — same height range as procedural buildings.
  const scY = clamp(b.h, 12, 210) / Math.max(origSz.y, 0.01);

  clone.scale.set(scXZ, scY, scXZ);

  // Re-ground the model: the loader's normalisation put the bottom at the
  // group's local y=0, but overriding the scale breaks that offset.
  // Correct formula: posY = -origSz.minY * scY  →  bottom lands at world y=0.
  clone.position.set(b.x, -origSz.minY * scY, b.z);
  clone.frustumCulled = false;
  scene.add(clone);
  ch._meshes.push(clone);
  b._glbMesh = clone;
}

function createLampMesh(lm, ch, _bC){
  // Pole → dedicated pole batch (keeps building body batch clean)
  const poleH = lm.top - lm.y;
  const cx = lm.x, cy = lm.y + poleH * 0.5, cz = lm.z;
  const hw = 0.15, hh = poleH * 0.5, hd = 0.15;
  const plv = _bC.plv;
  _bC.plPos.push(
    cx-hw,cy-hh,cz-hd, cx+hw,cy-hh,cz-hd, cx+hw,cy+hh,cz-hd, cx-hw,cy+hh,cz-hd,
    cx-hw,cy-hh,cz+hd, cx+hw,cy-hh,cz+hd, cx+hw,cy+hh,cz+hd, cx-hw,cy+hh,cz+hd
  );
  _bC.plIdx.push(
    plv,plv+2,plv+1, plv,plv+3,plv+2,
    plv+5,plv+7,plv+4, plv+5,plv+6,plv+7,
    plv+4,plv+3,plv, plv+4,plv+7,plv+3,
    plv+1,plv+6,plv+5, plv+1,plv+2,plv+6,
    plv+4,plv+1,plv+5, plv+4,plv,plv+1,
    plv+3,plv+6,plv+2, plv+3,plv+7,plv+6
  );
  _bC.plv += 8;

  // Head → head batch (neon vertex colour; MeshBasicMaterial = emissive-equivalent for bloom)
  const c = lm.col;
  const r = c[0]/255, g = c[1]/255, b = c[2]/255;
  const v0 = _bC.hv;
  const x = lm.x, y = lm.top, z = lm.z;
  const hhw = 0.45, hhh = 0.175, hhd = 0.45;
  _bC.hPos.push(
    x-hhw,y-hhh,z-hhd, x+hhw,y-hhh,z-hhd, x+hhw,y+hhh,z-hhd, x-hhw,y+hhh,z-hhd,
    x-hhw,y-hhh,z+hhd, x+hhw,y-hhh,z+hhd, x+hhw,y+hhh,z+hhd, x-hhw,y+hhh,z+hhd
  );
  for(let i=0;i<8;i++) _bC.hCol.push(r,g,b);
  _bC.hIdx.push(
    v0,v0+2,v0+1, v0,v0+3,v0+2,
    v0+5,v0+7,v0+4, v0+5,v0+6,v0+7,
    v0+4,v0+3,v0, v0+4,v0+7,v0+3,
    v0+1,v0+6,v0+5, v0+1,v0+2,v0+6,
    v0+4,v0+1,v0+5, v0+4,v0,v0+1,
    v0+3,v0+6,v0+2, v0+3,v0+7,v0+6
  );
  _bC.hv += 8;
}

function createDroneMesh(dr, ch){
